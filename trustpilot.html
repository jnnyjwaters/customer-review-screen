<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Trustpilot Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A; --jicama: #FBF8F2; --agave: #6FA0AF; --turmeric: #FFBC69; --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif; overflow: hidden; }
  .wrap { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 4vh 6vw; }
  .header { display: flex; justify-content: space-between; align-items: baseline; color: var(--jicama); margin-bottom: 3vh; }
  .header h1 { font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif; font-weight: 700; font-size: 2.6vw; letter-spacing: 0.02em; }
  .header .meta { font-size: 1.1vw; opacity: 0.75; }
  .stage { flex: 1; position: relative; }
  .card { position: absolute; inset: 0; background: var(--jicama); border-radius: 24px;
    border-left: 12px solid var(--agave); padding: 5vh 5vw; display: flex; flex-direction: column;
    justify-content: center; opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .card.active { opacity: 1; transform: translateY(0); }
  .stars { color: var(--turmeric); font-size: 2.6vw; letter-spacing: 0.05em; line-height: 1; }
  .quote-text { font-size: 3.1vw; line-height: 1.35; color: var(--text-dark); font-weight: 500; margin: 1vh 0 4vh 0; }
  .attribution { display: flex; align-items: center; gap: 1.2vw; }
  .badge { background: var(--indigo); color: var(--jicama); font-size: 1.15vw; font-weight: 700; padding: 0.6vh 1.4vw; border-radius: 999px; letter-spacing: 0.03em; }
  .who { font-size: 1.4vw; color: var(--text-dark); opacity: 0.75; }
  .footer { display: flex; justify-content: space-between; align-items: center; color: var(--jicama); opacity: 0.6; margin-top: 3vh; font-size: 1vw; }
  .dots { display: flex; gap: 0.5vw; flex-wrap: wrap; }
  .dot { width: 0.6vw; height: 0.6vw; border-radius: 50%; background: rgba(251,248,242,0.3); transition: background 0.3s ease; }
  .dot.active { background: var(--agave); }
  .live-dot { display: inline-block; width: 0.7vw; height: 0.7vw; border-radius: 50%; background: #6FCF97; margin-right: 0.6vw; animation: pulse 2s infinite ease-in-out; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
  <div class="wrap">

    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">

    </div>
  </div>

"6a5d2a29138d7184bef56cf4", "name": "customer", "text": "Remitly is a very good app. It works very well, is trustworthy, and provides excellent service. I highly recommend it.\ud83d\udc4c", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5d2a0a28bd75db8f87390e", "name": "customer", "text": "Excellent Service", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5d2435506acc7de0ce8573", "name": "customer", "text": "Very secure and easy to send money and gets confirmation Immediately", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5d23a1b1795ba904968a2b", "name": "cliente", "text": "La mejor opci\u00f3n para enviar dinero a otro pais", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5d1e4fe3cba495e1813d91", "name": "Yosafat Esquitin", "text": "Very good and fast, low fees and good rates", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5d1e327856804a7f4fb882", "name": "Pilo9", "text": "Service was fast and transparent on the fees.", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5d1d56da2665bc37ebcee0", "name": "abdullah", "text": "rates always less than most of apps", "date": "2026-07-19", "rating": 3}, {"source": "Trustpilot", "id": "6a5d182a7abcc6928c516420", "name": "Rasheedat Jinadu", "text": "The service is very fast and reliable.", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5d106c2e4956aa92792839", "name": "clienteRossi", "text": "El dinero llega a su destino , es seguro . Me encanto", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5d0c9cea7ab6cf2754022f", "name": "currently working", "text": "Excellent service", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5d0adeb89198f67b20dee9", "name": "cliente", "text": "Esta todo bien pero nomas que esta un poco m\u00e1s bajo el cambio que en otras aplicaciones.", "date": "2026-07-19", "rating": 4}, {"source": "Trustpilot", "id": "6a5d04098091090e90fccb7c", "name": "cliente", "text": "First responders", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5d0274488dcf20c3f07b4a", "name": "Maria", "text": "Me encanta, me encanta esta aplicaci\u00f3n de envio, r\u00e1pido y f\u00e1cil de enviar dinero a cualquier pa\u00eds del mundo", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5d010fe5a345510c8a3652", "name": "Maria Valera", "text": "Excelente empresa, segura y env\u00edos r\u00e1pidos con buena tasa de cambio a otros pa\u00edses", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5cfdc0a39949a28d2d5311", "name": "Mailin", "text": "R\u00e1pido y eficaz y sobretodo cuida la seguridad del dinero para que llegue a su destino final", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5cfb0cdda83b6e6502ab97", "name": "Naheed Ahmed", "text": "Excellent experience", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5cf9b1b11e37b746d3a99b", "name": "Irazema", "text": "Servicio muy bueno funcional y r\u00e1pido!", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5cf51d37bc60438ab334e0", "name": "customer", "text": "My transfer was promised to be delivered in 10hrs but it was delayed for no reason and no update was provided", "date": "2026-07-19", "rating": 1}, {"source": "Trustpilot", "id": "6a5cef74aa72826b6406bf29", "name": "cliente", "text": "me a ayudado mucho, al principio fue dificil ya que uno no sabe como es la aplicacion luego se volvio full confianza. lo recomiendo. todas mis transacciones seguras", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5ce8019fbbd295a2997b4e", "name": "Amparo", "text": "To send money is as fast as two minutes.", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5ce77ca98421875b80a3a1", "name": "Natalie", "text": "Fast & fun to use", "date": "2026-07-19", "rating": 5}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
    card.innerHTML = `
      <div class="stars">${stars}</div>
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');
  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }
  if (cards.length > 1) setInterval(next, 7000);
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
