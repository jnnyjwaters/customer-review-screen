<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Trustpilot Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A; --jicama: #FBF8F2; --agave: #6FA0AF; --turmeric: #FFBC69; --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif; overflow: hidden; }
  .wrap { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 4vh 6vw; }
  .header { display: flex; justify-content: space-between; align-items: baseline; color: var(--jicama); margin-bottom: 3vh; }
  .header h1 { font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif; font-weight: 700; font-size: 2.6vw; letter-spacing: 0.02em; }
  .header .meta { font-size: 1.1vw; opacity: 0.75; }
  .stage { flex: 1; position: relative; }
  .card { position: absolute; inset: 0; background: var(--jicama); border-radius: 24px;
    border-left: 12px solid var(--agave); padding: 5vh 5vw; display: flex; flex-direction: column;
    justify-content: center; opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .card.active { opacity: 1; transform: translateY(0); }
  .stars { color: var(--turmeric); font-size: 2.6vw; letter-spacing: 0.05em; line-height: 1; }
  .quote-text { font-size: 3.1vw; line-height: 1.35; color: var(--text-dark); font-weight: 500; margin: 1vh 0 4vh 0; }
  .attribution { display: flex; align-items: center; gap: 1.2vw; }
  .badge { background: var(--indigo); color: var(--jicama); font-size: 1.15vw; font-weight: 700; padding: 0.6vh 1.4vw; border-radius: 999px; letter-spacing: 0.03em; }
  .who { font-size: 1.4vw; color: var(--text-dark); opacity: 0.75; }
  .footer { display: flex; justify-content: space-between; align-items: center; color: var(--jicama); opacity: 0.6; margin-top: 3vh; font-size: 1vw; }
  .dots { display: flex; gap: 0.5vw; flex-wrap: wrap; }
  .dot { width: 0.6vw; height: 0.6vw; border-radius: 50%; background: rgba(251,248,242,0.3); transition: background 0.3s ease; }
  .dot.active { background: var(--agave); }
  .live-dot { display: inline-block; width: 0.7vw; height: 0.7vw; border-radius: 50%; background: #6FCF97; margin-right: 0.6vw; animation: pulse 2s infinite ease-in-out; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying on Trustpilot</h1>
      <div class="meta">Real Trustpilot reviews &middot; unedited &middot; refreshed 2026-07-15 09:19</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">

      <div class="dots" id="dots"></div>
    </div>
  </div>

a verdad est\u00e1 me encant\u00f3 y lo que m\u00e1s me gusta. Son las r\u00e1pidos que son", "date": "2026-07-15", "rating": 5}, {"source": "Trustpilot", "id": "6a56e2855621da02d828fddf", "name": "cliente", "text": "When I open the app, the rate was $17.84 when I send it, the rate was lower", "date": "2026-07-15", "rating": 1}, {"source": "Trustpilot", "id": "6a56d3afc8be4b3024765c46", "name": "Rito Paredes Garcia", "text": "El precio del d\u00f3lar estaba mejor que con la competencia. La comisi\u00f3n es aceptable \ud83d\ude03 Si ustedes me dan bien pago siempre mandar\u00e9 con remitly \ud83d\ude03", "date": "2026-07-15", "rating": 5}, {"source": "Trustpilot", "id": "6a56d36b37b556b71d25763e", "name": "F", "text": "Best, but review rates.", "date": "2026-07-15", "rating": 5}, {"source": "Trustpilot", "id": "6a56c75aa949c0030ff8f16a", "name": "customer", "text": "Very good experience all times I used this app, so fast, and feel confident sending money to my people", "date": "2026-07-15", "rating": 5}, {"source": "Trustpilot", "id": "6a56bd54f9c8c4e6a09d0231", "name": "customer", "text": "I like it because it's fast and easy. Once you send money you can repete the transfer in a fast way that's very convenient . Thank you \ud83d\ude0a", "date": "2026-07-15", "rating": 5}, {"source": "Trustpilot", "id": "6a56b9527f1789107c470453", "name": "customer", "text": "Very nice work \ud83e\udee1\ud83d\udc4d", "date": "2026-07-15", "rating": 4}, {"source": "Trustpilot", "id": "6a56b7cff6623d029e604f14", "name": "Francis Herrera", "text": "R\u00e1pido sin complicaciones la mejor aplicaci\u00f3n que puedo usar", "date": "2026-07-15", "rating": 5}, {"source": "Trustpilot", "id": "6a56b4db28d562e9da97c28d", "name": "customer", "text": "Honestly. Fast and easy!", "date": "2026-07-15", "rating": 5}, {"source": "Trustpilot", "id": "6a56b1cc124e99794b6bbdcc", "name": "KAMAL", "text": "Very bad customer service and bad cheap material and embroidery. Sent wrong size and when ask for return ask makes hundreds of accuses.", "date": "2026-07-15", "rating": 1}, {"source": "Trustpilot", "id": "6a56b16f4d4c5ccd78e5d8d4", "name": "cliente", "text": "Simplemente f\u00e1cil y r\u00e1pido", "date": "2026-07-15", "rating": 5}, {"source": "Trustpilot", "id": "6a56aed9e9fb301e6ae3a20a", "name": "Yasmin", "text": "Me recomendaron esta aplicaci\u00f3n es super r\u00e1pida en el momento de hacer los envios.", "date": "2026-07-14", "rating": 5}, {"source": "Trustpilot", "id": "6a56ae950d615d9e14e3d9aa", "name": "customer", "text": "They receive the money immediately.", "date": "2026-07-14", "rating": 5}, {"source": "Trustpilot", "id": "6a56ad7cfe62f630ee661d96", "name": "EDWIN", "text": "La rapidez para la entrega del env\u00edo, lo malo es que dicen le env\u00edan un mensaje de texto para la persona que va recibir el env\u00edo pero en todos los casos nunca han recibido notificaci\u00f3n del env\u00edo", "date": "2026-07-14", "rating": 4}, {"source": "Trustpilot", "id": "6a56abd9ea6d9ca5d5fc20e0", "name": "Manoj", "text": "Documentation asked after deposit. Your mediation bank (master card bank) seeking details which I believe were irrelevant for the transfer and delayed my transfer", "date": "2026-07-14", "rating": 3}, {"source": "Trustpilot", "id": "6a56a8c2c7ec389d528ce7bb", "name": "Customer Connie Call", "text": "Help was available with Remitly by phone when it was needed. I\u2019ll use Remitly in the future. Thank you!", "date": "2026-07-14", "rating": 5}, {"source": "Trustpilot", "id": "6a56a722e5cc2d602f3bdaf7", "name": "James", "text": "The transfers are always immediate. I'm so glad I found this app!", "date": "2026-07-14", "rating": 5}, {"source": "Trustpilot", "id": "6a5699125d799a5acb191ba0", "name": "customer", "text": "Fast and easy delivery", "date": "2026-07-14", "rating": 5}, {"source": "Trustpilot", "id": "6a5693ef47ea37c99f63ad98", "name": "Amelia", "text": "Fast and reliable", "date": "2026-07-14", "rating": 5}, {"source": "Trustpilot", "id": "6a568ceee137f33df961318f", "name": "Roy Dilks", "text": "Fast, safe, secure service.", "date": "2026-07-14", "rating": 5}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
    card.innerHTML = `
      <div class="stars">${stars}</div>
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');
  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }
  if (cards.length > 1) setInterval(next, 7000);
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
