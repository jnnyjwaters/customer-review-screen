<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Trustpilot Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A; --jicama: #FBF8F2; --agave: #6FA0AF; --turmeric: #FFBC69; --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif; overflow: hidden; }
  .wrap { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 4vh 6vw; }
  .header { display: flex; justify-content: space-between; align-items: baseline; color: var(--jicama); margin-bottom: 3vh; }
  .header h1 { font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif; font-weight: 700; font-size: 2.6vw; letter-spacing: 0.02em; }
  .header .meta { font-size: 1.1vw; opacity: 0.75; }
  .stage { flex: 1; position: relative; }
  .card { position: absolute; inset: 0; background: var(--jicama); border-radius: 24px;
    border-left: 12px solid var(--agave); padding: 5vh 5vw; display: flex; flex-direction: column;
    justify-content: center; opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .card.active { opacity: 1; transform: translateY(0); }
  .stars { color: var(--turmeric); font-size: 2.6vw; letter-spacing: 0.05em; line-height: 1; }
  .quote-text { font-size: 3.1vw; line-height: 1.35; color: var(--text-dark); font-weight: 500; margin: 1vh 0 4vh 0; }
  .attribution { display: flex; align-items: center; gap: 1.2vw; }
  .badge { background: var(--indigo); color: var(--jicama); font-size: 1.15vw; font-weight: 700; padding: 0.6vh 1.4vw; border-radius: 999px; letter-spacing: 0.03em; }
  .who { font-size: 1.4vw; color: var(--text-dark); opacity: 0.75; }
  .footer { display: flex; justify-content: space-between; align-items: center; color: var(--jicama); opacity: 0.6; margin-top: 3vh; font-size: 1vw; }
  .dots { display: flex; gap: 0.5vw; flex-wrap: wrap; }
  .dot { width: 0.6vw; height: 0.6vw; border-radius: 50%; background: rgba(251,248,242,0.3); transition: background 0.3s ease; }
  .dot.active { background: var(--agave); }
  .live-dot { display: inline-block; width: 0.7vw; height: 0.7vw; border-radius: 50%; background: #6FCF97; margin-right: 0.6vw; animation: pulse 2s infinite ease-in-out; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
  <div class="wrap">

0324f", "name": "cliente Jorge Garc\u00eda", "text": "Muy r\u00e1pido y seguro en sus entregas de env\u00edo", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a54b997f8ca6f75d551eab4", "name": "customer", "text": "It\u2019s faster and reliable. Great service", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a54b30fd483599628c1f99c", "name": "MrNarcissues", "text": "Very good rates and fixed service charge.", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a54a7cf8e8dc0b6a5476968", "name": "Elsa", "text": "Bis jetzt habe keine Probleme. Alles Super.", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a549c4793d3cafca35b440a", "name": "customer", "text": "Everything is great accept that each time when I send money I need to fill where I am nd where to send but that supposed to be in the system already unless I want to send somewhere else. Tank", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a549b469e49b2a237e2e1e8", "name": "customer", "text": "A great app it\u2019s just that the exchange rate is a bit lower than the government(international) rate so while sending money accuracy, transitions is not as expected other than that everything else is perfect easily.", "date": "2026-07-13", "rating": 4}, {"source": "Trustpilot", "id": "6a549aed448f0d133e74256c", "name": "cliente", "text": "Fast and good price", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a54945d7a4fe14895a89d30", "name": "Ania", "text": "Muy f\u00e1cil y r\u00e1pido.", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a548bb07ceb6c3633c5491c", "name": "customer", "text": "Speed of transfer and ease of use", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a54865b80262087c2bf784e", "name": "customer", "text": "Rapid and reliable service", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a547f8bdf35412bfd4c62d5", "name": "cliente", "text": "Nice work perfect", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a547801c7860a8e9752cfcb", "name": "Lydia Wangui", "text": "I just want my 500usd sent to me but it's still in \"Processing\". Your customer care is useless with the same Indians saying the same thing over and over again to give you 24hrs", "date": "2026-07-13", "rating": 1}, {"source": "Trustpilot", "id": "6a54755f4224ff643480e9ee", "name": "Otto salas", "text": "Buenas pero es de mucho enbustes lo de la recompensa no dan nada.", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a546e683982a403ebac073c", "name": "Ramira Garcia", "text": "Un servicio muy r\u00e1pido y seguro", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a54626f5e611472aedfcc78", "name": "KB", "text": "Thank you for the quick transactions and favorable exchange rates.", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a545bd8b73f0e195dc4feb9", "name": "Lezlie E", "text": "Everything went pretty smoothly. Just a bit expensive.", "date": "2026-07-13", "rating": 4}, {"source": "Trustpilot", "id": "6a5458c3c52dcd5e6515ef7d", "name": "customer", "text": "No upload any id or anything of that crap for small amounts. I don't like to much intrusive asking of documents. I just want to make my account, connect my debit card and send without questions. That im glad about, easy onboarding.", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a54552724522a29c0217a5a", "name": "customer", "text": "Awesome service I prefer to use and send money from this platform \ud83d\ude4f", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a544692832e8dfc323fced7", "name": "cliente", "text": "Las personas que me,ayudaron, fueron pacientes, y aabian bien como resolver mi problema. Un gran servicio.", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a54390412ed9a438ee857f1", "name": "GONZ\u00c1LEZ", "text": "Me encanta la repidez con que la persona recibe el dinero es una App segura y confiable", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a542e547266cd3142f85e40", "name": "Darryl", "text": "No hassle Quick and easy Easy to use Recipient gets money in seconds Easy to send reciept", "date": "2026-07-13", "rating": 5}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
    card.innerHTML = `
      <div class="stars">${stars}</div>
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');
  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }
  if (cards.length > 1) setInterval(next, 7000);
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
