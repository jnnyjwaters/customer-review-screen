<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A; --jicama: #FBF8F2; --agave: #6FA0AF; --turmeric: #FFBC69; --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif; overflow: hidden; }
  .wrap { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 4vh 6vw; }
  .header { display: flex; justify-content: space-between; align-items: baseline; color: var(--jicama); margin-bottom: 3vh; }
  .header h1 { font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif; font-weight: 700; font-size: 2.6vw; letter-spacing: 0.02em; }
  .header .meta { font-size: 1.1vw; opacity: 0.75; }
  .stage { flex: 1; position: relative; }
  .card { position: absolute; inset: 0; background: var(--jicama); border-radius: 24px;
    border-left: 12px solid var(--agave); padding: 5vh 5vw; display: flex; flex-direction: column;
    justify-content: center; opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .card.active { opacity: 1; transform: translateY(0); }
  .stars { color: var(--turmeric); font-size: 2.6vw; letter-spacing: 0.05em; line-height: 1; }
  .quote-text { font-size: 3.1vw; line-height: 1.35; color: var(--text-dark); font-weight: 500; margin: 1vh 0 4vh 0; }
  .attribution { display: flex; align-items: center; gap: 1.2vw; }
  .badge { background: var(--indigo); color: var(--jicama); font-size: 1.15vw; font-weight: 700; padding: 0.6vh 1.4vw; border-radius: 999px; letter-spacing: 0.03em; }
  .who { font-size: 1.4vw; color: var(--text-dark); opacity: 0.75; }
  .footer { display: flex; justify-content: space-between; align-items: center; color: var(--jicama); opacity: 0.6; margin-top: 3vh; font-size: 1vw; }
  .dots { display: flex; gap: 0.5vw; flex-wrap: wrap; }
  .dot { width: 0.6vw; height: 0.6vw; border-radius: 50%; background: rgba(251,248,242,0.3); transition: background 0.3s ease; }
  .dot.active { background: var(--agave); }
  .live-dot { display: inline-block; width: 0.7vw; height: 0.7vw; border-radius: 50%; background: #6FCF97; margin-right: 0.6vw; animation: pulse 2s infinite ease-in-out; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

celente muy r\u00e1pido y sin problemas y m\u00e1s x q lo ases desde tu celular \ud83d\udcaf recomiendo Gracias \ud83d\udc4d\ud83c\udffc\ud83d\udc4d\ud83c\udffc", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5babd823e9b0ed1f0bff62", "name": "Richard", "text": "Quite simple. And efficient.", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5bab3e49b369be270f8b9c", "name": "Isabella Valenzuela", "text": "Money in minutes and customer support are very helpful. Thank you.", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5baa583de2c461238960ef", "name": "customer", "text": "This app it\u2019s very good", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5ba8a8d779563d03154369", "name": "cliente", "text": "Exelente el dinero llega r\u00e1pido sin problema y no te cobra por enviarlo otras app si te cobran es seguro mejor que otras", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5ba2ca825bc510dc435d37", "name": "customerGabor Toth", "text": "the transfer did not arrive from the sender to the receiver", "date": "2026-07-18", "rating": 1}, {"source": "Trustpilot", "id": "6a5ba247a0eaeb53ff139bda", "name": "cliente", "text": "Enviar dinero es f\u00e1cil y llega r\u00e1pido", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5b9b7afc9ce8f8f0030bca", "name": "customer", "text": "Conversation rate is low compared to other", "date": "2026-07-18", "rating": 3}, {"source": "Trustpilot", "id": "6a5b9a951b1da0a128afcdcc", "name": "Nely portillo", "text": "Me encanta muy buena aplicaci\u00f3n", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5b973a9166e0368affe727", "name": "Janeth", "text": "Me gusta porque llega a tiempo el dinero", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5b83e37382c0e3f6a56fed", "name": "Eugene Heilman", "text": "Very professional, secure and reliable!", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5b82ac62f39ce607ec6ace", "name": "cliente Jenny", "text": "El servicio es excelente; la entrega se realiza dentro del plazo indicado y puedo hacer el seguimiento del env\u00edo sin ning\u00fan problema.", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5b81c01f64786d89040e01", "name": "Gino Ascenzo", "text": "Avoid. Costly, time consuming and the worst customer care. After years of being a customer, they froze accounts and money was left pending for many days, creating several problems and further payment delays.", "date": "2026-07-18", "rating": 1}, {"source": "Trustpilot", "id": "6a5b80b5575dce9bfbbf41cd", "name": "Omar", "text": "Remitly is an awesome link to send your money fast and reliable \ud83d\udc4c.", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5b7ef074ce9a327eaacfac", "name": "customer", "text": "Since i started sending money with Remitly save my time and my Family got money in less than 5 minutes", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5b7c691a98042636ec35e0", "name": "customer", "text": "It only takes seconds receive the transaction", "date": "2026-07-18", "rating": 4}, {"source": "Trustpilot", "id": "6a5b7b108c54aafefbae5494", "name": "Fernando giovanetti", "text": "S\u00faper r\u00e1pido y sin costos extras.", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5b751af4a76ff422aa674e", "name": "Pinky A.", "text": "The overall service, immediate response to questions, how incredibly quick the funds sent get to the receiver, email notifications every step of the way during transfers, and the fees. Remitly is simply the best way to send money abroad.", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5b74adc9d9833e0003c628", "name": "Dipanshu", "text": "Good Service received money instantly", "date": "2026-07-18", "rating": 4}, {"source": "Trustpilot", "id": "6a5b6a27e9a5e5878f588f2e", "name": "Carolyn", "text": "Remitly make it easy to send money to the other side of the world fast.", "date": "2026-07-18", "rating": 5}, {"source": "Trustpilot", "id": "6a5b59dd544479eb2c181343", "name": "customer", "text": "Very efficient and professional service", "date": "2026-07-18", "rating": 5}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
    card.innerHTML = `
      <div class="stars">${stars}</div>
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');
  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }
  if (cards.length > 1) setInterval(next, 7000);
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
