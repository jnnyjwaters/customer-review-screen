<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Trustpilot Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A; --jicama: #FBF8F2; --agave: #6FA0AF; --turmeric: #FFBC69; --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif; overflow: hidden; }
  .wrap { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 4vh 6vw; }
  .header { display: flex; justify-content: space-between; align-items: baseline; color: var(--jicama); margin-bottom: 3vh; }
  .header h1 { font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif; font-weight: 700; font-size: 2.6vw; letter-spacing: 0.02em; }
  .header .meta { font-size: 1.1vw; opacity: 0.75; }
  .stage { flex: 1; position: relative; }
  .card { position: absolute; inset: 0; background: var(--jicama); border-radius: 24px;
    border-left: 12px solid var(--agave); padding: 5vh 5vw; display: flex; flex-direction: column;
    justify-content: center; opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .card.active { opacity: 1; transform: translateY(0); }
  .stars { color: var(--turmeric); font-size: 2.6vw; letter-spacing: 0.05em; line-height: 1; }
  .quote-text { font-size: 3.1vw; line-height: 1.35; color: var(--text-dark); font-weight: 500; margin: 1vh 0 4vh 0; }
  .attribution { display: flex; align-items: center; gap: 1.2vw; }
  .badge { background: var(--indigo); color: var(--jicama); font-size: 1.15vw; font-weight: 700; padding: 0.6vh 1.4vw; border-radius: 999px; letter-spacing: 0.03em; }
  .who { font-size: 1.4vw; color: var(--text-dark); opacity: 0.75; }
  .footer { display: flex; justify-content: space-between; align-items: center; color: var(--jicama); opacity: 0.6; margin-top: 3vh; font-size: 1vw; }
  .dots { display: flex; gap: 0.5vw; flex-wrap: wrap; }
  .dot { width: 0.6vw; height: 0.6vw; border-radius: 50%; background: rgba(251,248,242,0.3); transition: background 0.3s ease; }
  .dot.active { background: var(--agave); }
  .live-dot { display: inline-block; width: 0.7vw; height: 0.7vw; border-radius: 50%; background: #6FCF97; margin-right: 0.6vw; animation: pulse 2s infinite ease-in-out; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying on Trustpilot</h1>
      <div class="meta">Real Trustpilot reviews &middot; unedited &middot; refreshed 2026-07-21 21:24</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">
      <div><span class="live-dot"></span>Remitly &middot; live customer voice, not marketing copy</div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

<script>

 5}, {"source": "Trustpilot", "id": "6a5f80e9186288ccb66bf153", "name": "cliente", "text": "Me gusta porque tus familiares pueden sacar la remesa muy r\u00e1pido y yo no tengo que ir a enviar en la tienda", "date": "2026-07-21", "rating": 4}, {"source": "Trustpilot", "id": "6a5f7f129dc18140cd77ccd5", "name": "Offiliya", "text": "Quick sent money and good job", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f7d25568abff72945f39d", "name": "cliente", "text": "Good Service, Thank You", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f7c987b7c1b7085600806", "name": "David Chapman", "text": "I have lived through the failure of Western Union and MoneyGram here in Angers. Your services are infinitely better and faster.", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f77827c13d891eb09b003", "name": "customer", "text": "sending very short time", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f75e75c6b6f5557cb06d0", "name": "Marcos areyan", "text": "Excelente servicio", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f73d5358db2821c84bd07", "name": "MashuroWedzerai", "text": "Easy terms and quick service.", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f71ddfcbaf6359ba1fc03", "name": "deyanira guzman", "text": "Pagan el d\u00f3lar por debajo del precio otras pagan lonjusto", "date": "2026-07-21", "rating": 1}, {"source": "Trustpilot", "id": "6a5f6b9a0e1739e94582e53f", "name": "kurt norrgard", "text": "Service very fast and good", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f6abe2d8330485b3dae51", "name": "Junaid Ahmed", "text": "Delayed service to Saudi Arabia (4 Days)", "date": "2026-07-21", "rating": 2}, {"source": "Trustpilot", "id": "6a5f68cfc70a112d1e8df829", "name": "Ramita Clark", "text": "Transferred was so fast", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f67bf820208da69868a89", "name": "Saidi kongo Mangare", "text": "It is good so far no complain", "date": "2026-07-21", "rating": 4}, {"source": "Trustpilot", "id": "6a5f6485e603428babd8feb2", "name": "customer", "text": "Easy and convenient to send money to Canada.", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f5cd65255767c7acd6de9", "name": "Michael Anyabuine", "text": "Well, my money got to the destination.", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f5892a3b756756ef8dc10", "name": "customelalsadiq", "text": "Very fast safe service thanks", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f56c83c49869bde1fa580", "name": "P", "text": "Smooth and hassle free transaction.", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f56453e261971b62f7a71", "name": "customer", "text": "Seamless, efficient and reliable", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f50fce9d77d8753e866d4", "name": "Polite Gutu", "text": "It was delivered in time", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f4aec739017951d4144a1", "name": "customer", "text": "Very Good Application", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5f3ef4bb32f67cfbc48023", "name": "customer", "text": "Great And so quiqe", "date": "2026-07-21", "rating": 5}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
    card.innerHTML = `
      <div class="stars">${stars}</div>
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');
  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }
  if (cards.length > 1) setInterval(next, 7000);
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
