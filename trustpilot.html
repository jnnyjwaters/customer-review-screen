<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Trustpilot Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A; --jicama: #FBF8F2; --agave: #6FA0AF; --turmeric: #FFBC69; --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif; overflow: hidden; }
  .wrap { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 4vh 6vw; }
  .header { display: flex; justify-content: space-between; align-items: baseline; color: var(--jicama); margin-bottom: 3vh; }
  .header h1 { font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif; font-weight: 700; font-size: 2.6vw; letter-spacing: 0.02em; }
  .header .meta { font-size: 1.1vw; opacity: 0.75; }
  .stage { flex: 1; position: relative; }
  .card { position: absolute; inset: 0; background: var(--jicama); border-radius: 24px;
    border-left: 12px solid var(--agave); padding: 5vh 5vw; display: flex; flex-direction: column;
    justify-content: center; opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .card.active { opacity: 1; transform: translateY(0); }
  .stars { color: var(--turmeric); font-size: 2.6vw; letter-spacing: 0.05em; line-height: 1; }
  .quote-text { font-size: 3.1vw; line-height: 1.35; color: var(--text-dark); font-weight: 500; margin: 1vh 0 4vh 0; }
  .attribution { display: flex; align-items: center; gap: 1.2vw; }
  .badge { background: var(--indigo); color: var(--jicama); font-size: 1.15vw; font-weight: 700; padding: 0.6vh 1.4vw; border-radius: 999px; letter-spacing: 0.03em; }
  .who { font-size: 1.4vw; color: var(--text-dark); opacity: 0.75; }
  .footer { display: flex; justify-content: space-between; align-items: center; color: var(--jicama); opacity: 0.6; margin-top: 3vh; font-size: 1vw; }
  .dots { display: flex; gap: 0.5vw; flex-wrap: wrap; }
  .dot { width: 0.6vw; height: 0.6vw; border-radius: 50%; background: rgba(251,248,242,0.3); transition: background 0.3s ease; }
  .dot.active { background: var(--agave); }
  .live-dot { display: inline-block; width: 0.7vw; height: 0.7vw; border-radius: 50%; background: #6FCF97; margin-right: 0.6vw; animation: pulse 2s infinite ease-in-out; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying on Trustpilot</h1>
      <div class="meta">Real Trustpilot reviews &middot; unedited &middot; refreshed 2026-07-09 18:59</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">

  </div>

"date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4fb05d2581bad8c96b3cc3", "name": "customer", "text": "Very good very good", "date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4faff44605af3fa19b9fa6", "name": "cliente", "text": "Pues buena aplicaci\u00f3n y el servicio es muy bueno ya q asta el momento no he tenido ning\u00fan problema con mis env\u00edos por eso les doy 4 estrellas", "date": "2026-07-09", "rating": 4}, {"source": "Trustpilot", "id": "6a4fa3ef94cad25adccc9912", "name": "customer", "text": "Great experience", "date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4fa2a0050a48477c837575", "name": "customer", "text": "It\u2019s all around more beneficial n affordable", "date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4fa23b6c9d9eb5756e9c27", "name": "customer", "text": "Transfers take less time", "date": "2026-07-09", "rating": 4}, {"source": "Trustpilot", "id": "6a4fa09b64e179b5c243d88e", "name": "cliente Jos\u00e9 Juan", "text": "Una experiencia bien", "date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4f8a618bf1f91527e58dd8", "name": "customer", "text": "easy to use fast and real", "date": "2026-07-09", "rating": 4}, {"source": "Trustpilot", "id": "6a4f83ce436bfdaec28442be", "name": "Karen Nugent", "text": "So easy to send money to family especially if there is an emergency. Money arrives usually within minutes.", "date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4f82ad38b67e422fd4996b", "name": "Eugenio Fiorotto", "text": "Cuando mando 200 d\u00f3lares manda perfecto , si quiero mandar mas me piden datos los doy y me vuelven a pedir lo mismo cada una hora me piden mismos datos", "date": "2026-07-09", "rating": 2}, {"source": "Trustpilot", "id": "6a4f80e8408979f3b5f43317", "name": "customer", "text": "They have the best rates, lowest fees and customer service is great and I also love the app. Makes the process so intuitive", "date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4f7b2683dc4901232a882b", "name": "Luis Fernando", "text": "Excelente servicio y atenci\u00f3n", "date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4f78ffa9b87427add1e3e1", "name": "cliente", "text": "Excelente. Muy r\u00e1pido.", "date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4f785c2fbca8d4a8bc6c63", "name": "ARUN CHENNATTU SUKUMARAN", "text": "Excellent superb", "date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4f78507290433e042398ce", "name": "Neff", "text": "money transfer went through almost as fast as sending money through Zelle my recipient in Mexico got the money really fast", "date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4f7666190791afe0be568f", "name": "customer", "text": "It\u2019s been very quick very easy very reliable. Easiest thing I\u2019ve used technology wise and so completely helpful.", "date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4f736034c141d09fee8b3c", "name": "Prem", "text": "Effective ,convenient ,higher rates easy to send", "date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4f6f4413c3d745fd7ab97c", "name": "Mi", "text": "Account suspension with no reason.", "date": "2026-07-09", "rating": 1}, {"source": "Trustpilot", "id": "6a4f4e1fe60261aea5a62dbf", "name": "PrincessBubble GUM", "text": "So much convenient for me and for my family \ud83d\udc9a\u2764\ufe0f\ud83d\udc95", "date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4f4c98d17f9a425f20d507", "name": "cliente", "text": "Me siento muy feliz de mandar dinero por Remitly para mi familia muchas gracias", "date": "2026-07-09", "rating": 5}, {"source": "Trustpilot", "id": "6a4f48d27acd7e7329db2778", "name": "customer", "text": "time and responsibility", "date": "2026-07-09", "rating": 4}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
    card.innerHTML = `
      <div class="stars">${stars}</div>
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');
  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }
  if (cards.length > 1) setInterval(next, 7000);
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
