<!DOCTYPE html>

<head>

<title>Remitly — Trustpilot Reviews</title>

<style>
  :root {
    --indigo: #2C415A; --jicama: #FBF8F2; --agave: #6FA0AF; --turmeric: #FFBC69; --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif; overflow: hidden; }
  .wrap { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 4vh 6vw; }
  .header { display: flex; justify-content: space-between; align-items: baseline; color: var(--jicama); margin-bottom: 3vh; }
  .header h1 { font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif; font-weight: 700; font-size: 2.6vw; letter-spacing: 0.02em; }
  .header .meta { font-size: 1.1vw; opacity: 0.75; }
  .stage { flex: 1; position: relative; }
  .card { position: absolute; inset: 0; background: var(--jicama); border-radius: 24px;
    border-left: 12px solid var(--agave); padding: 5vh 5vw; display: flex; flex-direction: column;
    justify-content: center; opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .card.active { opacity: 1; transform: translateY(0); }
  .stars { color: var(--turmeric); font-size: 2.6vw; letter-spacing: 0.05em; line-height: 1; }
  .quote-text { font-size: 3.1vw; line-height: 1.35; color: var(--text-dark); font-weight: 500; margin: 1vh 0 4vh 0; }
  .attribution { display: flex; align-items: center; gap: 1.2vw; }
  .badge { background: var(--indigo); color: var(--jicama); font-size: 1.15vw; font-weight: 700; padding: 0.6vh 1.4vw; border-radius: 999px; letter-spacing: 0.03em; }
  .who { font-size: 1.4vw; color: var(--text-dark); opacity: 0.75; }
  .footer { display: flex; justify-content: space-between; align-items: center; color: var(--jicama); opacity: 0.6; margin-top: 3vh; font-size: 1vw; }
  .dots { display: flex; gap: 0.5vw; flex-wrap: wrap; }
  .dot { width: 0.6vw; height: 0.6vw; border-radius: 50%; background: rgba(251,248,242,0.3); transition: background 0.3s ease; }
  .dot.active { background: var(--agave); }
  .live-dot { display: inline-block; width: 0.7vw; height: 0.7vw; border-radius: 50%; background: #6FCF97; margin-right: 0.6vw; animation: pulse 2s infinite ease-in-out; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

ource": "Trustpilot", "id": "6a5e6de115c80f16b6ec0667", "name": "Silvana", "text": "Porque las transferencias se realizan r\u00e1pido en un termino de 1 o 2 horas y les llega bien a las personas q quiero y no te cobrar ninguna comisi\u00f3n", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e6d8d3a5a8db572d9ade4", "name": "customer Mike", "text": "Much easier to make transactions opposed to all the other companies that provide this service", "date": "2026-07-20", "rating": 4}, {"source": "Trustpilot", "id": "6a5e5df36eddda48311bf2b4", "name": "customer", "text": "I got a great experience", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e5cf335b649ae46d7bd04", "name": "customer", "text": "Best for money transfers", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e5964cd0272d8f3792cb4", "name": "customer", "text": "Very simple process flow once set up.", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e58b5c4c38fc20177ee0e", "name": "customer", "text": "Instant transfer", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e55eec6269ae528c89010", "name": "Ashley", "text": "The premium is high.", "date": "2026-07-20", "rating": 3}, {"source": "Trustpilot", "id": "6a5e553f5e26c696203967c1", "name": "Shaz", "text": "I received the money on time", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e4f4bf583f1bfc47e732d", "name": "Mildred Torres", "text": "Process is very simple.", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e43412d3c9234c600b5a7", "name": "Nayara", "text": "Remitly is the best!!", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e3e629c386d1a413cd041", "name": "customer", "text": "Wel faster service", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e3e0952fd54af6bc2fc9a", "name": "customer", "text": "Your company is the best, I received my money in few minutes", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e374d15af49a4115f1615", "name": "Christopher cox", "text": "My experience is great here i lo e using Remitly its very easy to use very great I love it", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e2e75ab07b550cc66182d", "name": "Wladimir Jose", "text": "Muy f\u00e1cil de utilizar, llegan muy muy r\u00e1pido las remesas, recomendado al 100%", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e2c787745be5b3ab4a0b8", "name": "customer", "text": "I like that transactions are being processed faster but the thing i dislike that is their rates are not very good they are charging the money from transaction amounts.", "date": "2026-07-20", "rating": 3}, {"source": "Trustpilot", "id": "6a5e27b56b15bdb8c3dbee7a", "name": "SAI KARUNAKAR REDDY KOLAGOTLA", "text": "In the initial days , Verification was asked for each & every Currency Conversion which made Lot of Delay in the process of Conversion Later on , Remitly stopped asking for Conversion again & again and the Currency Conversion was Quick", "date": "2026-07-20", "rating": 4}, {"source": "Trustpilot", "id": "6a5e15eba035a7b237d6b94d", "name": "Caritas", "text": "The speed at which the funds are sent to receiver", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e14cf534c3be65070f01a", "name": "Sof\u00eda Franco", "text": "Tarifas justas, velocidad en el env\u00edo del dinero y facilidad al recibirlo y enviarlo", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e12d03570ae703f512235", "name": "customer", "text": "Very bad always make frustrated", "date": "2026-07-20", "rating": 1}, {"source": "Trustpilot", "id": "6a5e12ac86e5556a06b611cb", "name": "Debra Shaw Rolle", "text": "Very very happy with the quick service", "date": "2026-07-20", "rating": 5}, {"source": "Trustpilot", "id": "6a5e11d66510b634d959ebea", "name": "Marina Samaan", "text": "It was easy to use, clear updates and quick. Also great rates", "date": "2026-07-20", "rating": 5}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
    card.innerHTML = `
      <div class="stars">${stars}</div>
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');
  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }
  if (cards.length > 1) setInterval(next, 7000);
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
