<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Trustpilot Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A; --jicama: #FBF8F2; --agave: #6FA0AF; --turmeric: #FFBC69; --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif; overflow: hidden; }
  .wrap { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 4vh 6vw; }
  .header { display: flex; justify-content: space-between; align-items: baseline; color: var(--jicama); margin-bottom: 3vh; }
  .header h1 { font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif; font-weight: 700; font-size: 2.6vw; letter-spacing: 0.02em; }
  .header .meta { font-size: 1.1vw; opacity: 0.75; }
  .stage { flex: 1; position: relative; }
  .card { position: absolute; inset: 0; background: var(--jicama); border-radius: 24px;
    border-left: 12px solid var(--agave); padding: 5vh 5vw; display: flex; flex-direction: column;
    justify-content: center; opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .card.active { opacity: 1; transform: translateY(0); }
  .stars { color: var(--turmeric); font-size: 2.6vw; letter-spacing: 0.05em; line-height: 1; }
  .quote-text { font-size: 3.1vw; line-height: 1.35; color: var(--text-dark); font-weight: 500; margin: 1vh 0 4vh 0; }
  .attribution { display: flex; align-items: center; gap: 1.2vw; }
  .badge { background: var(--indigo); color: var(--jicama); font-size: 1.15vw; font-weight: 700; padding: 0.6vh 1.4vw; border-radius: 999px; letter-spacing: 0.03em; }
  .who { font-size: 1.4vw; color: var(--text-dark); opacity: 0.75; }
  .footer { display: flex; justify-content: space-between; align-items: center; color: var(--jicama); opacity: 0.6; margin-top: 3vh; font-size: 1vw; }
  .dots { display: flex; gap: 0.5vw; flex-wrap: wrap; }
  .dot { width: 0.6vw; height: 0.6vw; border-radius: 50%; background: rgba(251,248,242,0.3); transition: background 0.3s ease; }
  .dot.active { background: var(--agave); }
  .live-dot { display: inline-block; width: 0.7vw; height: 0.7vw; border-radius: 50%; background: #6FCF97; margin-right: 0.6vw; animation: pulse 2s infinite ease-in-out; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying on Trustpilot</h1>
      <div class="meta">Real Trustpilot reviews &middot; unedited &middot; refreshed 2026-07-19 18:37</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">
      <div><span class="live-dot"></span>Remitly &middot; live customer voice, not marketing copy</div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

<script>

 I sent has not been received by the recipient. I tried solving the problem via Remitly chat and also I called the 888 number. They said they will investigate. In the mean time, the recipient has to wait .", "date": "2026-07-19", "rating": 1}, {"source": "Trustpilot", "id": "6a5cd45f9f445680ab89b67a", "name": "customer", "text": "Fast and easy to use", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5cd1b663ba5ce2f6dc7514", "name": "customer", "text": "It took about 2 days to complete the transaction.", "date": "2026-07-19", "rating": 3}, {"source": "Trustpilot", "id": "6a5cccac828905720644ea25", "name": "Christopher Primeaux", "text": "Great 10 minute transfer for a great price and exchange rate", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5cc57339dbaa6f70667a67", "name": "Wendy Stratis", "text": "Excellent service!", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5cbc46b45606558e4cb3e9", "name": "customer", "text": "Sending money is easy with this money app, however there is always room for improvement", "date": "2026-07-19", "rating": 4}, {"source": "Trustpilot", "id": "6a5cb7b8fec7009b2f29e3df", "name": "customer", "text": "It\u2019s ok but most of the time I try to open the app it wouldn\u2019t open", "date": "2026-07-19", "rating": 3}, {"source": "Trustpilot", "id": "6a5caaa0284aa3e9e826b8c3", "name": "customer", "text": "Always received best service!!", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5c976a2afbd97d2da46ae7", "name": "customer", "text": "I appreciate the process very convenience and very helpful and easy", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5c90b69bcac82de1b9fa72", "name": "Abdulrahim bashir", "text": "Excellent service", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5c90a0d63c2cf71097fed9", "name": "Lisseth Amaro", "text": "excelente aplicacion", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5c7f37a46434d2ba288253", "name": "Jes.", "text": "Great rate, fast and easy to send", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5c6a2bb30498fc510518f7", "name": "customer", "text": "This application is the best for everyone need to send money", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5c6a0a6089cd5c57a9459b", "name": "CESAR", "text": "Excelecte y bien proseso", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5c51ffbe7c722c13edec3e", "name": "customer", "text": "Remitly made it easy for real for real", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5c500604150bbe0e5b7cc8", "name": "HASSAN", "text": "immediate transfer with almost best rates", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5c44953ecfffb4b4a1ed6b", "name": "cliente", "text": "Muy bueno demasiado r\u00e1pido y sin salir de casa", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5c432ecee1646128c04efb", "name": "customer", "text": "It has good change rates i like it as it is fast too, instantly delivering services.", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5c413890a62b3d64cd04bb", "name": "cliente", "text": "Transfer rapido economico seguro y buen tipo de cambio en la comodidas de donde quiera q me encuentre", "date": "2026-07-19", "rating": 5}, {"source": "Trustpilot", "id": "6a5c401c77f66983937c67c6", "name": "Jorge Miranda", "text": "Que a los 20 minutos ya estaba disponible el dinero y que es f\u00e1cil y r\u00e1pido el proceso. Gracias", "date": "2026-07-19", "rating": 5}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
    card.innerHTML = `
      <div class="stars">${stars}</div>
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');
  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }
  if (cards.length > 1) setInterval(next, 7000);
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
