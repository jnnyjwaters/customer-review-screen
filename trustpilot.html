<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Trustpilot Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A; --jicama: #FBF8F2; --agave: #6FA0AF; --turmeric: #FFBC69; --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif; overflow: hidden; }
  .wrap { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 4vh 6vw; }
  .header { display: flex; justify-content: space-between; align-items: baseline; color: var(--jicama); margin-bottom: 3vh; }
  .header h1 { font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif; font-weight: 700; font-size: 2.6vw; letter-spacing: 0.02em; }
  .header .meta { font-size: 1.1vw; opacity: 0.75; }
  .stage { flex: 1; position: relative; }
  .card { position: absolute; inset: 0; background: var(--jicama); border-radius: 24px;
    border-left: 12px solid var(--agave); padding: 5vh 5vw; display: flex; flex-direction: column;
    justify-content: center; opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .card.active { opacity: 1; transform: translateY(0); }
  .stars { color: var(--turmeric); font-size: 2.6vw; letter-spacing: 0.05em; line-height: 1; }
  .quote-text { font-size: 3.1vw; line-height: 1.35; color: var(--text-dark); font-weight: 500; margin: 1vh 0 4vh 0; }
  .attribution { display: flex; align-items: center; gap: 1.2vw; }
  .badge { background: var(--indigo); color: var(--jicama); font-size: 1.15vw; font-weight: 700; padding: 0.6vh 1.4vw; border-radius: 999px; letter-spacing: 0.03em; }
  .who { font-size: 1.4vw; color: var(--text-dark); opacity: 0.75; }
  .footer { display: flex; justify-content: space-between; align-items: center; color: var(--jicama); opacity: 0.6; margin-top: 3vh; font-size: 1vw; }
  .dots { display: flex; gap: 0.5vw; flex-wrap: wrap; }
  .dot { width: 0.6vw; height: 0.6vw; border-radius: 50%; background: rgba(251,248,242,0.3); transition: background 0.3s ease; }
  .dot.active { background: var(--agave); }
  .live-dot { display: inline-block; width: 0.7vw; height: 0.7vw; border-radius: 50%; background: #6FCF97; margin-right: 0.6vw; animation: pulse 2s infinite ease-in-out; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying on Trustpilot</h1>
      <div class="meta">Real Trustpilot reviews &middot; unedited &middot; refreshed 2026-07-22 07:18</div>
    </div>
    <div class="stage" id="stage"></div>

<script>
  const REVIEWS = [{"source": "Trustpilot", "id": "6a605092e8931fb49165e289", "name": "Juanita Williams", "text": "Great service especially when Remitly just sends every transaction to the recipient\u2019s phone number wallet account. Makes it very convenient", "date": "2026-07-22", "rating": 4}, {"source": "Trustpilot", "id": "6a604f7f0b470b6a1a8caab3", "name": "cliente", "text": "Me encanta la app, es r\u00e1pida y segura y muy f\u00e1cil para usar, y el precio por env\u00edo esta bastante bien,es accesible.", "date": "2026-07-22", "rating": 5}, {"source": "Trustpilot", "id": "6a604ea13db2d8b9b1063354", "name": "cliente", "text": "La aplicaci\u00f3n es excelente muy segura y llega el dinero en el momento, estoy muy contenta.", "date": "2026-07-22", "rating": 5}, {"source": "Trustpilot", "id": "6a604b62c9b7937ae4182422", "name": "Navdeep Sandhu", "text": "Excellent and easy", "date": "2026-07-22", "rating": 5}, {"source": "Trustpilot", "id": "6a604387b70cc2ef065c58c0", "name": "Birenkumar Desai", "text": "Company doing fantastic job with low transfer fee and good exchange rate", "date": "2026-07-22", "rating": 5}, {"source": "Trustpilot", "id": "6a603be295ff90c2fa51bd79", "name": "Mar\u00eda Amparo Osegueda", "text": "Me gusta este m\u00e9todo para enviar dinero, mi familia ha recibido con \u00e9xito, no hay perdida, pero no me gusta el tiempo que tarda en recibir el dinero, me parece que seis d\u00edas es demasiado tiempo", "date": "2026-07-22", "rating": 3}, {"source": "Trustpilot", "id": "6a6038bf2a9caf1fd3067a4b", "name": "Moli", "text": "Excelente y confiable", "date": "2026-07-22", "rating": 5}, {"source": "Trustpilot", "id": "6a6031b561817fc3d8e9319b", "name": "Mon William cruz", "text": "Thanks very fast", "date": "2026-07-22", "rating": 5}, {"source": "Trustpilot", "id": "6a60300b5655a3a8f9dbd65b", "name": "Hugo", "text": "It\u2019s one of the many ways to send money to your loved one\u2019s, secure and efficient. Nothing better than having a good way to help people that you love. Thank you", "date": "2026-07-22", "rating": 5}, {"source": "Trustpilot", "id": "6a6020b9975b84355b584a45", "name": "customer", "text": "Not good service", "date": "2026-07-22", "rating": 1}, {"source": "Trustpilot", "id": "6a601d5532cb3f7d5302570c", "name": "cliente", "text": "Muy bueno la verdad y r\u00e1pido el invio", "date": "2026-07-22", "rating": 5}, {"source": "Trustpilot", "id": "6a60145ed6dcca578f9fdeb4", "name": "Jonathan Berkowitz", "text": "I like the ease with which I can make the transaction. What I don\u2019t like is the confusion over how long it takes for the recipient to actually receive the money, and, in my experience, I would really prefer more expediency\u2026", "date": "2026-07-22", "rating": 3}, {"source": "Trustpilot", "id": "6a600866bdf3047ec626f42f", "name": "Adrian Okean", "text": "Speedy delivery time", "date": "2026-07-22", "rating": 4}, {"source": "Trustpilot", "id": "6a6004a574cf8ee1d47e9c59", "name": "cliente", "text": "Very good and easy", "date": "2026-07-22", "rating": 5}, {"source": "Trustpilot", "id": "6a5ff9baeeb9844bb5b309ed", "name": "customer", "text": "I like it because It makes easy and faster to transfer your money.", "date": "2026-07-22", "rating": 4}, {"source": "Trustpilot", "id": "6a5ff82615655f93cf3f841c", "name": "Tereli Medina", "text": "Es una excelente forma de env\u00edo", "date": "2026-07-22", "rating": 5}, {"source": "Trustpilot", "id": "6a5ff7b6c1a85da405cef739", "name": "customerKacyann Heslop", "text": "Customer sevice was great", "date": "2026-07-22", "rating": 5}, {"source": "Trustpilot", "id": "6a5ff67ce1e8c1e80099cb5f", "name": "Heather McFeather Jeal", "text": "Transfer was quick, seamless, and cost-effective. The exchange rate was very competitive. I sent to Mexico and realized that it is important to use the recipient's account number and full name to ensure the funds are correctly deposited.", "date": "2026-07-22", "rating": 5}, {"source": "Trustpilot", "id": "6a5ff14ea38f3d927f23220a", "name": "Mosaab Bedoui", "text": "Great app Easy to use", "date": "2026-07-22", "rating": 5}, {"source": "Trustpilot", "id": "6a5fe95a6ab4c3b6746f2b46", "name": "cliente", "text": "Muy r\u00e1pido y eficiente??", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5fe908f335f9b7c57f1d96", "name": "Oliver Vel\u00e1squez", "text": "Excelente servicio. Lo recomiendo", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5fe29a2ca3d063411f2f0a", "name": "PATRICK", "text": "There can be long delays in transferring funds to Mpessa accounts", "date": "2026-07-21", "rating": 3}, {"source": "Trustpilot", "id": "6a5fe0b778bdf0c057346cbc", "name": "Sarahil Zoraida Gonzalez", "text": "Excelente aplicaci\u00f3n, muy sencilla, intuitiva, el tipo de cambio es competitivo y el dinero llega super r\u00e1pido", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5fde5d91c324d75f36834d", "name": "Harpreet", "text": "Amazing app and best price. Very easy to use and send money instantly...", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5fdd771121a87af80e0f0b", "name": "cliente", "text": "Very good experience with the app \ud83d\ude4c\ud83c\udffb", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5fd61efd9bc8e8fb659649", "name": "customer", "text": "Hi everything went well and the transaction was swift.. I\u2019ll say it was amazing \ud83e\udd70 Good job keep it up \ud83d\udc4d", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5fd317789d82cdc11f0548", "name": "customerpaul", "text": "Very easy to use, no exorbitant fees.", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5fd0a767ac82383f128a3c", "name": "Deivy Batista", "text": "I like this app; it's efficient. I recommend it to everyone.", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5fcf740ee1593096aaa694", "name": "Donatus", "text": "My transfers are fast and with less charges", "date": "2026-07-21", "rating": 5}, {"source": "Trustpilot", "id": "6a5fc7e137529fee34cbda47", "name": "cliente Jos\u00e9 Moreno", "text": "E tenido algunos problemas al principio pero esta mejorando", "date": "2026-07-21", "rating": 4}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
    card.innerHTML = `
      <div class="stars">${stars}</div>
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');
  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }
  if (cards.length > 1) setInterval(next, 7000);
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
