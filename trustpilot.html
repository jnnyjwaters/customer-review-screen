<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Trustpilot Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A; --jicama: #FBF8F2; --agave: #6FA0AF; --turmeric: #FFBC69; --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif; overflow: hidden; }
  .wrap { display: flex; flex-direction: column; width: 100vw; height: 100vh; padding: 4vh 6vw; }
  .header { display: flex; justify-content: space-between; align-items: baseline; color: var(--jicama); margin-bottom: 3vh; }
  .header h1 { font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif; font-weight: 700; font-size: 2.6vw; letter-spacing: 0.02em; }
  .header .meta { font-size: 1.1vw; opacity: 0.75; }
  .stage { flex: 1; position: relative; }
  .card { position: absolute; inset: 0; background: var(--jicama); border-radius: 24px;
    border-left: 12px solid var(--agave); padding: 5vh 5vw; display: flex; flex-direction: column;
    justify-content: center; opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .card.active { opacity: 1; transform: translateY(0); }
  .stars { color: var(--turmeric); font-size: 2.6vw; letter-spacing: 0.05em; line-height: 1; }
  .quote-text { font-size: 3.1vw; line-height: 1.35; color: var(--text-dark); font-weight: 500; margin: 1vh 0 4vh 0; }
  .attribution { display: flex; align-items: center; gap: 1.2vw; }
  .badge { background: var(--indigo); color: var(--jicama); font-size: 1.15vw; font-weight: 700; padding: 0.6vh 1.4vw; border-radius: 999px; letter-spacing: 0.03em; }
  .who { font-size: 1.4vw; color: var(--text-dark); opacity: 0.75; }
  .footer { display: flex; justify-content: space-between; align-items: center; color: var(--jicama); opacity: 0.6; margin-top: 3vh; font-size: 1vw; }
  .dots { display: flex; gap: 0.5vw; flex-wrap: wrap; }
  .dot { width: 0.6vw; height: 0.6vw; border-radius: 50%; background: rgba(251,248,242,0.3); transition: background 0.3s ease; }
  .dot.active { background: var(--agave); }
  .live-dot { display: inline-block; width: 0.7vw; height: 0.7vw; border-radius: 50%; background: #6FCF97; margin-right: 0.6vw; animation: pulse 2s infinite ease-in-out; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

: "customer", "text": "Awesome service I prefer to use and send money from this platform \ud83d\ude4f", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a544692832e8dfc323fced7", "name": "cliente", "text": "Las personas que me,ayudaron, fueron pacientes, y aabian bien como resolver mi problema. Un gran servicio.", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a54390412ed9a438ee857f1", "name": "GONZ\u00c1LEZ", "text": "Me encanta la repidez con que la persona recibe el dinero es una App segura y confiable", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a542e547266cd3142f85e40", "name": "Darryl", "text": "No hassle Quick and easy Easy to use Recipient gets money in seconds Easy to send reciept", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a542dd0cfc94556976e3c42", "name": "Salvador", "text": "Greap app to sent money to you family or freind easy", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a5428ea160a0611cb1532fb", "name": "Pedro suarez", "text": "Son geniales excelencia, calidad y celeridad en el servicio", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a54233555932aad6c38ad29", "name": "Joanna", "text": "Es m\u00e1s f\u00e1cil y r\u00e1pido econ\u00f3mico siempre lo usar\u00e9", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a54206e6b0acc51287e9035", "name": "Yudit Santana", "text": "Buena aplicaci\u00f3n,env\u00edo r\u00e1pido y seguro de dinero.Gracias!", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a541c93468d02d890e0fa95", "name": "Luis", "text": "La rapidez en todo el env\u00edo de mi dinero", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a54102c66339228b6fe502a", "name": "Miguel", "text": "Very convenient app to use, I send money to Mexico for my vacation definitely good and smooth app to use", "date": "2026-07-13", "rating": 5}, {"source": "Trustpilot", "id": "6a541008706f4ad4bb72b3ce", "name": "Manuel Jimenez", "text": "Excelente recomendada", "date": "2026-07-13", "rating": 5}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
    card.innerHTML = `
      <div class="stars">${stars}</div>
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');
  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }
  if (cards.length > 1) setInterval(next, 7000);
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
