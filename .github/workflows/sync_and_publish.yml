name: Sync Review Wall → Pages

on:
  schedule:
    - cron: "5,35 * * * *"   # 5 min after the private repo's own build cycle
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest review-wall.html from the private source repo
        env:
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          curl -sS -f -o index.html.tmp \
            -H "Authorization: Bearer ${SOURCE_REPO_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/jnnyjwaters/office-screens/contents/screens/review-wall.html"
          mv index.html.tmp index.html

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "sync: publish latest review wall $(date -u +%Y-%m-%dT%H:%M)"
          git push
