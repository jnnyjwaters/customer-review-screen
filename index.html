<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Real Customer Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A;
    --jicama: #FBF8F2;
    --agave: #6FA0AF;
    --turmeric: #FFBC69;
    --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif;
    overflow: hidden;
  }
  .wrap {
    display: flex; flex-direction: column;
    width: 100vw; height: 100vh;
    padding: 4vh 6vw;
  }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--jicama);
    margin-bottom: 3vh;
  }
  .header h1 {
    font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif;
    font-weight: 700;
    font-size: 2.6vw;
    letter-spacing: 0.02em;
  }
  .header .meta {
    font-size: 1.1vw;
    opacity: 0.75;
  }
  .stage {
    flex: 1;
    position: relative;
  }
  .card {
    position: absolute; inset: 0;
    background: var(--jicama);
    border-radius: 24px;
    border-left: 12px solid var(--agave);
    padding: 5vh 5vw;
    display: flex; flex-direction: column; justify-content: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .card.active {
    opacity: 1;
    transform: translateY(0);
  }
  .stars {
    color: var(--turmeric);
    font-size: 2.6vw;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .quote-mark {
    font-size: 6vw;
    color: var(--agave);
    line-height: 1;
    font-family: Georgia, serif;
  }
  .quote-text {
    font-size: 3.1vw;
    line-height: 1.35;
    color: var(--text-dark);
    font-weight: 500;
    margin: 1vh 0 4vh 0;
  }
  .attribution {
    display: flex; align-items: center; gap: 1.2vw;
  }
  .badge {
    background: var(--indigo);
    color: var(--jicama);
    font-size: 1.15vw;
    font-weight: 700;
    padding: 0.6vh 1.4vw;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .who {
    font-size: 1.4vw;
    color: var(--text-dark);
    opacity: 0.75;
  }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--jicama);
    opacity: 0.6;
    margin-top: 3vh;
    font-size: 1vw;
  }
  .dots {
    display: flex; gap: 0.5vw;
    flex-wrap: wrap;
  }
  .dot {
    width: 0.6vw; height: 0.6vw; border-radius: 50%;
    background: rgba(251,248,242,0.3);
    transition: background 0.3s ease;
  }
  .dot.active { background: var(--agave); }
  .live-dot {
    display: inline-block;
    width: 0.7vw; height: 0.7vw;
    border-radius: 50%;
    background: #6FCF97;
    margin-right: 0.6vw;
    animation: pulse 2s infinite ease-in-out;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying right now</h1>
      <div class="meta">Real App Store &amp; Google Play reviews &middot; unedited &middot; refreshed 2026-07-06 20:06</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">
      <div><span class="live-dot"></span>Remitly &middot; live customer voice, not marketing copy</div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

<script>
  const REVIEWS = [{"source": "App Store", "name": "Total adici\u00f3n!", "text": "Buena, r\u00e1pida\u2026 me encanta!", "date": "2026-07-05", "rating": 5}, {"source": "Google Play", "name": "Yelitza Monrroy", "text": "Es s\u00faper f\u00e1cil y r\u00e1pido hacer env\u00edos. Gracias Remitly por apoyar a mi pa\u00eds natal Venezuela \u2764\ufe0f", "date": "2026-07-06", "rating": null}, {"source": "App Store", "name": "Snnavsceuuwksxb", "text": "Fast and easy transfers", "date": "2026-07-05", "rating": 5}, {"source": "Google Play", "name": "Ak D", "text": "but rate is giving less campers zo other app like botim", "date": "2026-07-06", "rating": null}, {"source": "App Store", "name": "Vzla22", "text": "It\u2019s a really great app works amazing, fast", "date": "2026-07-05", "rating": 5}, {"source": "Google Play", "name": "Sahim Ali", "text": "good remitly I am satisfied I like you", "date": "2026-07-06", "rating": null}, {"source": "App Store", "name": "Alonso km57", "text": "Muy buena el tipo de cambio a M\u00e9xico est\u00e1 bien y sobre todo llega rapid\u00edsimo el dinero  y cobro por el env\u00edo baj\u00edsimo", "date": "2026-07-05", "rating": 5}, {"source": "Google Play", "name": "Eduardo Vargas", "text": "exelente las tasas muy bien.", "date": "2026-07-06", "rating": null}, {"source": "App Store", "name": "Cake cakes", "text": "Quick and easy the best", "date": "2026-07-05", "rating": 5}, {"source": "Google Play", "name": "Amparo Bocco", "text": "califico a REMITLY con 9.9, tengo con ellos 6 a\u00f1os aprox. puntuales en la entrega, serios y responsables. Gracias Remitly", "date": "2026-07-06", "rating": null}, {"source": "App Store", "name": "Mauricio Vel\u00e1squez C", "text": "Servicio espectacular\u2026 si puediera le dar\u00eda diez estrellas\u2026", "date": "2026-07-04", "rating": 5}, {"source": "Google Play", "name": "Spencer Manners", "text": "Easy, low-cost way to transfer money overseas. Also, very intuitive App.", "date": "2026-07-06", "rating": null}, {"source": "App Store", "name": "Tony andalusia", "text": "Take it easy for sending money international only a few second time arrived", "date": "2026-07-04", "rating": 5}, {"source": "Google Play", "name": "Elizabeth Chaparro", "text": "es sencilla y confiable", "date": "2026-07-06", "rating": null}, {"source": "App Store", "name": "Mejor obcion", "text": "%100 recommendable", "date": "2026-07-04", "rating": 5}, {"source": "Google Play", "name": "Nicole Galc", "text": "La migliore app per mandare soldi ovunque. avete la possibilit\u00e0 di inviare soldi in qualsiasi banca oppure anche in contanti. sicura, affidabile, veloce e soprattutto molto economica. Meravigliosa.", "date": "2026-07-06", "rating": null}, {"source": "App Store", "name": "G.Garay", "text": "I\u2019m very happy with Remitly \nThanks", "date": "2026-07-04", "rating": 5}, {"source": "Google Play", "name": "Christinia", "text": "fast easy money transfer with no headaches", "date": "2026-07-06", "rating": null}, {"source": "App Store", "name": "El humilde de Oaxaca", "text": "Gracias por la atenci\u00f3n tan r\u00e1pida y eficaz y no tengo que batallar para ayudar a mis familiares de ante mano muchas gracias", "date": "2026-07-04", "rating": 5}, {"source": "Google Play", "name": "mer Be", "text": "seguro,f\u00e1cil y r\u00e1pido", "date": "2026-07-06", "rating": null}, {"source": "App Store", "name": "Tito Orozco", "text": "Muy buen servicio", "date": "2026-07-04", "rating": 5}, {"source": "Google Play", "name": "Ajayk Kautlar", "text": "very good service", "date": "2026-07-06", "rating": null}, {"source": "App Store", "name": "Juarez Lara", "text": "Es muy r\u00e1pido y pr\u00e1ctico lo luego entregan el dinero a minutos", "date": "2026-07-04", "rating": 5}, {"source": "Google Play", "name": "jose rodriguez", "text": "Excelente es r\u00e1pido", "date": "2026-07-06", "rating": null}, {"source": "App Store", "name": "carlosnjj", "text": "Tiene buenas cosa y malas cosas pero es esencial", "date": "2026-07-04", "rating": 5}, {"source": "Google Play", "name": "Jonathan Casta\u00f1eda Urrego", "text": "r\u00e1pida , segura y confiable .", "date": "2026-07-06", "rating": null}, {"source": "App Store", "name": "Taurus girl40", "text": "Hassle free  apps anytime anywhere u can use money to your love ones", "date": "2026-07-03", "rating": 5}, {"source": "Google Play", "name": "poop pee", "text": "one convenient way to send money overseas", "date": "2026-07-06", "rating": null}, {"source": "App Store", "name": "\ud83d\udcb0\ud83d\udd0c\ud83d\udc8e", "text": "Tiene una Taza de Pago bien", "date": "2026-07-03", "rating": 5}, {"source": "Google Play", "name": "Sohel Khalifa", "text": "it's amazing app and money transfer quickly", "date": "2026-07-06", "rating": null}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const topLine = r.rating
      ? `<div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>`
      : `<div class="quote-mark">&ldquo;</div>`;
    card.innerHTML = `
      ${topLine}
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');

  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }

  setInterval(next, 7000);

  // A refresh job regenerates this file periodically. Reload on the same
  // cadence so the on-screen browser picks up fresh reviews on its own.
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
