<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Real Customer Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A;
    --jicama: #FBF8F2;
    --agave: #6FA0AF;
    --turmeric: #FFBC69;
    --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif;
    overflow: hidden;
  }
  .wrap {
    display: flex; flex-direction: column;
    width: 100vw; height: 100vh;
    padding: 4vh 6vw;
  }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--jicama);
    margin-bottom: 3vh;
  }
  .header h1 {
    font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif;
    font-weight: 700;
    font-size: 2.6vw;
    letter-spacing: 0.02em;
  }
  .header .meta {
    font-size: 1.1vw;
    opacity: 0.75;
  }
  .stage {
    flex: 1;
    position: relative;
  }
  .card {
    position: absolute; inset: 0;
    background: var(--jicama);
    border-radius: 24px;
    border-left: 12px solid var(--agave);
    padding: 5vh 5vw;
    display: flex; flex-direction: column; justify-content: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .card.active {
    opacity: 1;
    transform: translateY(0);
  }
  .stars {
    color: var(--turmeric);
    font-size: 2.6vw;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .quote-mark {
    font-size: 6vw;
    color: var(--agave);
    line-height: 1;
    font-family: Georgia, serif;
  }
  .quote-text {
    font-size: 3.1vw;
    line-height: 1.35;
    color: var(--text-dark);
    font-weight: 500;
    margin: 1vh 0 4vh 0;
  }
  .attribution {
    display: flex; align-items: center; gap: 1.2vw;
  }
  .badge {
    background: var(--indigo);
    color: var(--jicama);
    font-size: 1.15vw;
    font-weight: 700;
    padding: 0.6vh 1.4vw;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .who {
    font-size: 1.4vw;
    color: var(--text-dark);
    opacity: 0.75;
  }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--jicama);
    opacity: 0.6;
    margin-top: 3vh;
    font-size: 1vw;
  }
  .dots {
    display: flex; gap: 0.5vw;
    flex-wrap: wrap;
  }
  .dot {
    width: 0.6vw; height: 0.6vw; border-radius: 50%;
    background: rgba(251,248,242,0.3);
    transition: background 0.3s ease;
  }
  .dot.active { background: var(--agave); }
  .live-dot {
    display: inline-block;
    width: 0.7vw; height: 0.7vw;
    border-radius: 50%;
    background: #6FCF97;
    margin-right: 0.6vw;
    animation: pulse 2s infinite ease-in-out;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying right now</h1>
      <div class="meta">Real App Store &amp; Google Play reviews &middot; unedited &middot; refreshed 2026-07-07 21:56</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">
      <div><span class="live-dot"></span>Remitly &middot; live customer voice, not marketing copy</div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

<script>

ate": "2026-07-07", "rating": null}, {"source": "App Store", "name": "Bibileon", "text": "Esta aplicacion es muy efectiva la recomiendo", "date": "2026-07-05", "rating": 5}, {"source": "Google Play", "name": "Jorge E. Aponte Lasso", "text": "env\u00edos facil y r\u00e1pido", "date": "2026-07-07", "rating": null}, {"source": "App Store", "name": "Fabian like", "text": "Best service ever", "date": "2026-07-05", "rating": 5}, {"source": "Google Play", "name": "Gael Alvarado", "text": "Es r\u00e1pida y eficaz", "date": "2026-07-07", "rating": null}, {"source": "App Store", "name": "Total adici\u00f3n!", "text": "Buena, r\u00e1pida\u2026 me encanta!", "date": "2026-07-05", "rating": 5}, {"source": "Google Play", "name": "Edmund puplampu", "text": "Better than never.", "date": "2026-07-07", "rating": null}, {"source": "App Store", "name": "Snnavsceuuwksxb", "text": "Fast and easy transfers", "date": "2026-07-05", "rating": 5}, {"source": "Google Play", "name": "Jimmy Rivera Richard", "text": "excelente servicio", "date": "2026-07-07", "rating": null}, {"source": "App Store", "name": "Vzla22", "text": "It\u2019s a really great app works amazing, fast", "date": "2026-07-05", "rating": 5}, {"source": "Google Play", "name": "Hector Cardenas", "text": "buenas plataforma tienen q mejorar tas tasas de pago est\u00e1n bajas pero funciona para emergencias", "date": "2026-07-07", "rating": null}, {"source": "App Store", "name": "Alonso km57", "text": "Muy buena el tipo de cambio a M\u00e9xico est\u00e1 bien y sobre todo llega rapid\u00edsimo el dinero  y cobro por el env\u00edo baj\u00edsimo", "date": "2026-07-05", "rating": 5}, {"source": "Google Play", "name": "Md Jabel Khan", "text": "good apps i like this app and i am heppy", "date": "2026-07-07", "rating": null}, {"source": "App Store", "name": "Cake cakes", "text": "Quick and easy the best", "date": "2026-07-05", "rating": 5}, {"source": "Google Play", "name": "Geovane Melo", "text": "excelente app, ja tive outros mas a remirly supera todos em taxa em todos os aspectos.", "date": "2026-07-07", "rating": null}, {"source": "App Store", "name": "Mauricio Vel\u00e1squez C", "text": "Servicio espectacular\u2026 si puediera le dar\u00eda diez estrellas\u2026", "date": "2026-07-04", "rating": 5}, {"source": "Google Play", "name": "Nancy Colmenares", "text": "Excelente vale la pena muchas gracias por enviar dinero a la familia tan r\u00e1pido", "date": "2026-07-07", "rating": null}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const topLine = r.rating
      ? `<div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>`
      : `<div class="quote-mark">&ldquo;</div>`;
    card.innerHTML = `
      ${topLine}
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');

  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }

  setInterval(next, 7000);

  // A refresh job regenerates this file periodically. Reload on the same
  // cadence so the on-screen browser picks up fresh reviews on its own.
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
