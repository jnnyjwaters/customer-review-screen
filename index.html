<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Real Customer Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A;
    --jicama: #FBF8F2;
    --agave: #6FA0AF;
    --turmeric: #FFBC69;
    --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif;
    overflow: hidden;
  }
  .wrap {
    display: flex; flex-direction: column;
    width: 100vw; height: 100vh;
    padding: 4vh 6vw;
  }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--jicama);
    margin-bottom: 3vh;
  }
  .header h1 {
    font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif;
    font-weight: 700;
    font-size: 2.6vw;
    letter-spacing: 0.02em;
  }
  .header .meta {
    font-size: 1.1vw;
    opacity: 0.75;
  }
  .stage {
    flex: 1;
    position: relative;
  }
  .card {
    position: absolute; inset: 0;
    background: var(--jicama);
    border-radius: 24px;
    border-left: 12px solid var(--agave);
    padding: 5vh 5vw;
    display: flex; flex-direction: column; justify-content: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .card.active {
    opacity: 1;
    transform: translateY(0);
  }
  .stars {
    color: var(--turmeric);
    font-size: 2.6vw;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .quote-mark {
    font-size: 6vw;
    color: var(--agave);
    line-height: 1;
    font-family: Georgia, serif;
  }
  .quote-text {
    font-size: 3.1vw;
    line-height: 1.35;
    color: var(--text-dark);
    font-weight: 500;
    margin: 1vh 0 4vh 0;
  }
  .attribution {
    display: flex; align-items: center; gap: 1.2vw;
  }
  .badge {
    background: var(--indigo);
    color: var(--jicama);
    font-size: 1.15vw;
    font-weight: 700;
    padding: 0.6vh 1.4vw;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .who {
    font-size: 1.4vw;
    color: var(--text-dark);
    opacity: 0.75;
  }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--jicama);
    opacity: 0.6;
    margin-top: 3vh;
    font-size: 1vw;
  }
  .dots {
    display: flex; gap: 0.5vw;
    flex-wrap: wrap;
  }
  .dot {
    width: 0.6vw; height: 0.6vw; border-radius: 50%;
    background: rgba(251,248,242,0.3);
    transition: background 0.3s ease;
  }
  .dot.active { background: var(--agave); }
  .live-dot {
    display: inline-block;
    width: 0.7vw; height: 0.7vw;
    border-radius: 50%;
    background: #6FCF97;
    margin-right: 0.6vw;
    animation: pulse 2s infinite ease-in-out;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying right now</h1>
      <div class="meta">Real App Store &amp; Google Play reviews &middot; unedited &middot; refreshed 2026-07-12 01:09</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">
      <div><span class="live-dot"></span>Remitly &middot; live customer voice, not marketing copy</div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

<script>
  const REVIEWS = [{"source": "App Store", "name": "SG Love \u2665\ufe0f", "text": "It was very easy, fast and cheaper than every other way I have used for international transfers!! Thank you Remitly!", "date": "2026-07-10", "rating": 5}, {"source": "Google Play", "name": "Gerson Ramon", "text": "Muy buena aplicaci\u00f3n me encanta", "date": "2026-07-11", "rating": null}, {"source": "App Store", "name": "Elimallo", "text": "Llevo a\u00f1os usando este m\u00e9todo para mandar dinero y es un proceso seguro ,r\u00e1pido y responsable el mejor m\u00e9todo, no lo cambiar\u00eda por nada f\u00e1cil y desde mi casa.", "date": "2026-07-10", "rating": 5}, {"source": "Google Play", "name": "Attila Michael Varga", "text": "sehr schnelle \u00fcberweisung. einfache Handhabung. 5 Sterne", "date": "2026-07-11", "rating": null}, {"source": "App Store", "name": "tatiwong", "text": "Puedes f\u00e1cilmente encontrar muchas opciones de env\u00edo r\u00e1pido y econ\u00f3mico para muchos de los que necesitamos ayudar a la familia\ud83e\udef6\ud83c\udffb", "date": "2026-07-10", "rating": 5}, {"source": "Google Play", "name": "alvaro zabaleta", "text": "responsables y puntuales", "date": "2026-07-11", "rating": null}, {"source": "App Store", "name": "Boltu5", "text": "Me encanta esta aplicaci\u00f3n, ya puedo enviar a mi familia en Venezuela y m\u00e1s por la situaci\u00f3n del terremoto que necesitan m\u00e1s mi ayuda \ud83d\ude4fgracias Remitly", "date": "2026-07-10", "rating": 5}, {"source": "Google Play", "name": "\u30ce\u30a2\u30fb\u30c0\u30fc\u30af\u30cd\u30b9NoahTLL", "text": "esta bien pero quisieta que me dejara enviar m\u00e1s", "date": "2026-07-11", "rating": null}, {"source": "App Store", "name": "1000muy bueno", "text": "Muy f\u00e1cil de entender y mandar dinero", "date": "2026-07-10", "rating": 5}, {"source": "Google Play", "name": "Ernesto Hidalgo", "text": "Excelente servicio. Felicitaciones", "date": "2026-07-11", "rating": null}, {"source": "App Store", "name": "Dythiaoska", "text": "La verdad lo recomiendo", "date": "2026-07-09", "rating": 5}, {"source": "Google Play", "name": "Brudhel Bamokila", "text": "Le service est rapide et l'application mobile est hautement stable.", "date": "2026-07-11", "rating": null}, {"source": "App Store", "name": "Fatimae de la cruz", "text": "Reliable and fast", "date": "2026-07-09", "rating": 5}, {"source": "Google Play", "name": "Antonio", "text": "Fant\u00e1stico, hasta ahora no tengo ning\u00fan inconveniente", "date": "2026-07-11", "rating": null}, {"source": "App Store", "name": "picorete!", "text": "Por su buen servicio y satisfacci\u00f3n nos ayuda mucho . Muchas gracias", "date": "2026-07-09", "rating": 5}, {"source": "Google Play", "name": "Jignesh Patel", "text": "Best service.I am happy.", "date": "2026-07-11", "rating": null}, {"source": "App Store", "name": "El mejor para enviar dinero", "text": "S\u00faper buena y segura", "date": "2026-07-09", "rating": 5}, {"source": "Google Play", "name": "aura bello", "text": "excelente la facilidad para enviar dinero", "date": "2026-07-11", "rating": null}, {"source": "App Store", "name": "AnthonyRojas10", "text": "Nunca hab\u00eda tenido una app para enviar dinero tan r\u00e1pido y de la manera m\u00e1s f\u00e1cil como Remitly, la recomiendo a ojos cerrados.", "date": "2026-07-09", "rating": 5}, {"source": "Google Play", "name": "Alexander G\u00f3mez", "text": "muy r\u00e1pido confiable y no hay necesidad de salir de casa \ud83c\udfe1", "date": "2026-07-11", "rating": null}, {"source": "App Store", "name": "margarita Borboa", "text": "Me encanta porque no es nada dif\u00edcil tiene miles de sucursales en nuestro pa\u00eds M\u00e9xico \ud83c\uddf2\ud83c\uddfd", "date": "2026-07-09", "rating": 4}, {"source": "Google Play", "name": "Misikir eyob", "text": "Easy to use. Minimal boxes to fill for an international transfer.", "date": "2026-07-11", "rating": null}, {"source": "App Store", "name": "Latin Franklin", "text": "It\u2019s affordable, quick and safe.", "date": "2026-07-09", "rating": 5}, {"source": "Google Play", "name": "Aurelis", "text": "apenas probando la app, a la espera que llegue el env\u00edo.", "date": "2026-07-11", "rating": null}, {"source": "App Store", "name": "sografathima", "text": "Easy to transfer", "date": "2026-07-08", "rating": 5}, {"source": "Google Play", "name": "Samuel international", "text": "it really gives first transfer", "date": "2026-07-11", "rating": null}, {"source": "App Store", "name": "Kafloji", "text": "Me gusta que la aplicaci\u00f3n sea r\u00e1pida con datos precisos y directos.", "date": "2026-07-08", "rating": 5}, {"source": "Google Play", "name": "Sonu Gill", "text": "its very good service", "date": "2026-07-11", "rating": null}, {"source": "App Store", "name": "Jenson lopchan", "text": "Easy and convenient way to send money", "date": "2026-07-08", "rating": 5}, {"source": "Google Play", "name": "Joudeline Alce", "text": "me siento seguro en esta aplication y le amo", "date": "2026-07-11", "rating": null}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const topLine = r.rating
      ? `<div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>`
      : `<div class="quote-mark">&ldquo;</div>`;
    card.innerHTML = `
      ${topLine}
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');

  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }

  setInterval(next, 7000);

  // A refresh job regenerates this file periodically. Reload on the same
  // cadence so the on-screen browser picks up fresh reviews on its own.
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
