<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Real Customer Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A;
    --jicama: #FBF8F2;
    --agave: #6FA0AF;
    --turmeric: #FFBC69;
    --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif;
    overflow: hidden;
  }
  .wrap {
    display: flex; flex-direction: column;
    width: 100vw; height: 100vh;
    padding: 4vh 6vw;
  }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--jicama);
    margin-bottom: 3vh;
  }
  .header h1 {
    font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif;
    font-weight: 700;
    font-size: 2.6vw;
    letter-spacing: 0.02em;
  }
  .header .meta {
    font-size: 1.1vw;
    opacity: 0.75;
  }
  .stage {
    flex: 1;
    position: relative;
  }
  .card {
    position: absolute; inset: 0;
    background: var(--jicama);
    border-radius: 24px;
    border-left: 12px solid var(--agave);
    padding: 5vh 5vw;
    display: flex; flex-direction: column; justify-content: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .card.active {
    opacity: 1;
    transform: translateY(0);
  }
  .stars {
    color: var(--turmeric);
    font-size: 2.6vw;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .quote-mark {
    font-size: 6vw;
    color: var(--agave);
    line-height: 1;
    font-family: Georgia, serif;
  }
  .quote-text {
    font-size: 3.1vw;
    line-height: 1.35;
    color: var(--text-dark);
    font-weight: 500;
    margin: 1vh 0 4vh 0;
  }
  .attribution {
    display: flex; align-items: center; gap: 1.2vw;
  }
  .badge {
    background: var(--indigo);
    color: var(--jicama);
    font-size: 1.15vw;
    font-weight: 700;
    padding: 0.6vh 1.4vw;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .who {
    font-size: 1.4vw;
    color: var(--text-dark);
    opacity: 0.75;
  }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--jicama);
    opacity: 0.6;
    margin-top: 3vh;
    font-size: 1vw;
  }
  .dots {
    display: flex; gap: 0.5vw;
    flex-wrap: wrap;
  }
  .dot {
    width: 0.6vw; height: 0.6vw; border-radius: 50%;
    background: rgba(251,248,242,0.3);
    transition: background 0.3s ease;
  }
  .dot.active { background: var(--agave); }
  .live-dot {
    display: inline-block;
    width: 0.7vw; height: 0.7vw;
    border-radius: 50%;
    background: #6FCF97;
    margin-right: 0.6vw;
    animation: pulse 2s infinite ease-in-out;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying right now</h1>
      <div class="meta">Real App Store &amp; Google Play reviews &middot; unedited &middot; refreshed 2026-07-21 09:11</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">
      <div><span class="live-dot"></span>Remitly &middot; live customer voice, not marketing copy</div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

<script>
  const REVIEWS = [{"source": "App Store", "name": "Dom\u00ednguez2411", "text": "Tiene buen atenci\u00f3n al cliente y un sistema eficiente , lo malo es su tipo de cambio es un poco bajo", "date": "2026-07-19", "rating": 5}, {"source": "Google Play", "name": "Mohamed Ben Moussa", "text": "simple et rapide et efficace des frais raisonnable.", "date": "2026-07-21", "rating": null}, {"source": "App Store", "name": "Le\u2764\ufe0f\ud83c\udf39", "text": "I love Remitly because it\u2019s fast and secure.", "date": "2026-07-19", "rating": 4}, {"source": "Google Play", "name": "Juan Lopez", "text": "great way to send money", "date": "2026-07-21", "rating": null}, {"source": "App Store", "name": "Mikeblaky", "text": "Asta el momento todo a sido muy r\u00e1pido y confiable..", "date": "2026-07-19", "rating": 5}, {"source": "Google Play", "name": "Jose Panama", "text": "excelente servicio. y muy puntuales para la entrega", "date": "2026-07-21", "rating": null}, {"source": "App Store", "name": "donjuanbens", "text": "Very easy to send money quickly and safely.", "date": "2026-07-19", "rating": 5}, {"source": "Google Play", "name": "Kerry Wilson", "text": "Remitly is quick and easy. Sometimes transfers are instant.", "date": "2026-07-21", "rating": null}, {"source": "App Store", "name": "CarkVict", "text": "Faster and trustworthy", "date": "2026-07-19", "rating": 5}, {"source": "Google Play", "name": "mileydi garcia", "text": "me encanta todo \ud83d\udc4c", "date": "2026-07-21", "rating": null}, {"source": "App Store", "name": "abrione4", "text": "fast to transfer from a US Bank account to a Philippine Bank account", "date": "2026-07-19", "rating": 5}, {"source": "Google Play", "name": "Chat o Logic", "text": "very reasonable expenses. the transfer happened instantly. I was very happy with the transaction.", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "gliycett", "text": "Very easy and very fast", "date": "2026-07-19", "rating": 5}, {"source": "Google Play", "name": "Javier Torres Mora", "text": "r\u00e1pido y seguro \ud83d\udd10", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "RivrRoseMoon", "text": "The easiest and best way to send money!!! Once I began using Remitly, I do not send money any other way!!!", "date": "2026-07-19", "rating": 5}, {"source": "Google Play", "name": "Balraj Singh", "text": "Easiest way to send money to loved ones in just few seconds and save time.", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "Oti father!!", "text": "This platform has been very dependable until yesterday when a transaction took 12 hrs to process but they delivered as promised due to system maintenance.  Would have liked a warning in advance of sending so I know ahead of time.", "date": "2026-07-19", "rating": 5}, {"source": "Google Play", "name": "Alex Rodriguez", "text": "w wa wsw\ud83d\ude03\ud83d\ude03\ud83d\ude03\ud83d\ude03\ud83d\ude03\ud83d\ude03\ud83d\ude03\ud83d\ude01", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "Alanumas", "text": "Very helpful indications and user friendly platform.", "date": "2026-07-19", "rating": 5}, {"source": "Google Play", "name": "yesenia lopez", "text": "the best money transfer. really easy to use.", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "Jhurrem", "text": "A penas empiezo a utilizar la app, y estoy satisfecha con los movimientos que he realizado, seguir\u00e9 us\u00e1ndola con tranquilidad hasta ahora.", "date": "2026-07-18", "rating": 4}, {"source": "Google Play", "name": "Claudia Ramirez", "text": "Excelente servicio", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "Gonzalez$", "text": "Muy buena aplicaci\u00f3n recomendada 100%", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "JOSE ANTONIO ROMERO", "text": "muy buena aplicacion", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "Urielito2", "text": "Es f\u00e1cil de usar, an\u00edmense", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "sacolee Gooden", "text": "thanks for making sending money easy", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "Jaxson 27", "text": "Absolutely safe fast excellent setup", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "Tuly Perez", "text": "Bien Bueno Rapidicimo", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "Cabras de monta\u00f1a", "text": "Excelente servicio", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "Katib Jan", "text": "Five stars for Gregory! My friend was in the hospital, and I needed to send funds to Pakistan right away. Gregory was compassionate, fast, and made sure the transfer went through smoothly. Thank you for your outstanding help when it mattered most!", "date": "2026-07-20", "rating": null}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const topLine = r.rating
      ? `<div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>`
      : `<div class="quote-mark">&ldquo;</div>`;
    card.innerHTML = `
      ${topLine}
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');

  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }

  setInterval(next, 7000);

  // A refresh job regenerates this file periodically. Reload on the same
  // cadence so the on-screen browser picks up fresh reviews on its own.
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
