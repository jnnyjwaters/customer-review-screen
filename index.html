<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Real Customer Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A;
    --jicama: #FBF8F2;
    --agave: #6FA0AF;
    --turmeric: #FFBC69;
    --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif;
    overflow: hidden;
  }
  .wrap {
    display: flex; flex-direction: column;
    width: 100vw; height: 100vh;
    padding: 4vh 6vw;
  }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--jicama);
    margin-bottom: 3vh;
  }
  .header h1 {
    font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif;
    font-weight: 700;
    font-size: 2.6vw;
    letter-spacing: 0.02em;
  }
  .header .meta {
    font-size: 1.1vw;
    opacity: 0.75;
  }
  .stage {
    flex: 1;
    position: relative;
  }
  .card {
    position: absolute; inset: 0;
    background: var(--jicama);
    border-radius: 24px;
    border-left: 12px solid var(--agave);
    padding: 5vh 5vw;
    display: flex; flex-direction: column; justify-content: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .card.active {
    opacity: 1;
    transform: translateY(0);
  }
  .stars {
    color: var(--turmeric);
    font-size: 2.6vw;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .quote-mark {
    font-size: 6vw;
    color: var(--agave);
    line-height: 1;
    font-family: Georgia, serif;
  }
  .quote-text {
    font-size: 3.1vw;
    line-height: 1.35;
    color: var(--text-dark);
    font-weight: 500;
    margin: 1vh 0 4vh 0;
  }
  .attribution {
    display: flex; align-items: center; gap: 1.2vw;
  }
  .badge {
    background: var(--indigo);
    color: var(--jicama);
    font-size: 1.15vw;
    font-weight: 700;
    padding: 0.6vh 1.4vw;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .who {
    font-size: 1.4vw;
    color: var(--text-dark);
    opacity: 0.75;
  }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--jicama);
    opacity: 0.6;
    margin-top: 3vh;
    font-size: 1vw;
  }
  .dots {
    display: flex; gap: 0.5vw;
    flex-wrap: wrap;
  }
  .dot {
    width: 0.6vw; height: 0.6vw; border-radius: 50%;
    background: rgba(251,248,242,0.3);
    transition: background 0.3s ease;
  }
  .dot.active { background: var(--agave); }
  .live-dot {
    display: inline-block;
    width: 0.7vw; height: 0.7vw;
    border-radius: 50%;
    background: #6FCF97;
    margin-right: 0.6vw;
    animation: pulse 2s infinite ease-in-out;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying right now</h1>
      <div class="meta">Real App Store &amp; Google Play reviews &middot; unedited &middot; refreshed 2026-07-20 22:05</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">
      <div><span class="live-dot"></span>Remitly &middot; live customer voice, not marketing copy</div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

<script>

t": "Bien Bueno Rapidicimo", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "Marioda Olvera", "text": "He usado esta app por m\u00e1s de 7 a\u00f1os y siempre ha sido confiable y r\u00e1pido", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "Katib Jan", "text": "Five stars for Gregory! My friend was in the hospital, and I needed to send funds to Pakistan right away. Gregory was compassionate, fast, and made sure the transfer went through smoothly. Thank you for your outstanding help when it mattered most!", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "andy adriel", "text": "Es muy f\u00e1cil   R\u00e1pido y muy seguro ,", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "Jocelyn Milan", "text": "everything its good. thank you", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "Chakis fast", "text": "Yo dudaba  de todas las plata formas ahora que me recommendaron esta app me ahorro. Tiempo y dinero y no solo eso r\u00e1pido queda el envio ya sea que lo mandes a ventanilla o cuenta directa. Totalmente recommended.", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "Carlos Perez", "text": "cumple las funciones", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "Carlos_Survey", "text": "Me encanta esta aplicaci\u00f3n, porque en segundos o minutos tengo mi dinero disponible en Mexico, el tipo de cambio var\u00eda el d\u00eda como todas las aplicaciones, pero si llegas a encontrar un buen cambio aprovecha para mandarte una buena cantidad", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "elizabeth giron", "text": "super buena est\u00e1 aplicaci\u00f3n nos ahorramos tiempo \ud83d\ude4c", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "Mitolito.", "text": "Hace ya a\u00f1os, que uso el servicio de Remitly para mis remesas. Siempre puntual, siempre exacto y siempre confiable.", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "Sangita Thapa magar", "text": "easy and reliable", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "Best game \u00ed like it", "text": "Exelente durante estos 4 a\u00f1os q lo uso es el mejor", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "D Kiernikowski", "text": "fanfreakingtastic", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "sarca flaca", "text": "Muy responsable y muy f\u00e1cil para enviar", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "Vuyani Mnqobisi", "text": "Convenient all the time", "date": "2026-07-20", "rating": null}, {"source": "App Store", "name": "Lowe Miller", "text": "Always reliable and fast. Been using for years and it\u2019s my safe space to send money to my family in Jamaica.", "date": "2026-07-17", "rating": 5}, {"source": "Google Play", "name": "Maria Veronica Almenar Ordaz", "text": "Me parece excelente aplicaci\u00f3n, la uso para enviar dinero a Venezuela. Es f\u00e1cil de entender y el dinero llega en el tiempo prometido a la cuenta bancaria de mi familiar.", "date": "2026-07-20", "rating": null}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const topLine = r.rating
      ? `<div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>`
      : `<div class="quote-mark">&ldquo;</div>`;
    card.innerHTML = `
      ${topLine}
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');

  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }

  setInterval(next, 7000);

  // A refresh job regenerates this file periodically. Reload on the same
  // cadence so the on-screen browser picks up fresh reviews on its own.
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
