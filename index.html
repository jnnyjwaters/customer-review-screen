<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Real Customer Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A;
    --jicama: #FBF8F2;
    --agave: #6FA0AF;
    --turmeric: #FFBC69;
    --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif;
    overflow: hidden;
  }
  .wrap {
    display: flex; flex-direction: column;
    width: 100vw; height: 100vh;
    padding: 4vh 6vw;
  }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--jicama);
    margin-bottom: 3vh;
  }
  .header h1 {
    font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif;
    font-weight: 700;
    font-size: 2.6vw;
    letter-spacing: 0.02em;
  }
  .header .meta {
    font-size: 1.1vw;
    opacity: 0.75;
  }
  .stage {
    flex: 1;
    position: relative;
  }
  .card {
    position: absolute; inset: 0;
    background: var(--jicama);
    border-radius: 24px;
    border-left: 12px solid var(--agave);
    padding: 5vh 5vw;
    display: flex; flex-direction: column; justify-content: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .card.active {
    opacity: 1;
    transform: translateY(0);
  }
  .stars {
    color: var(--turmeric);
    font-size: 2.6vw;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .quote-mark {
    font-size: 6vw;
    color: var(--agave);
    line-height: 1;
    font-family: Georgia, serif;
  }
  .quote-text {
    font-size: 3.1vw;
    line-height: 1.35;
    color: var(--text-dark);
    font-weight: 500;
    margin: 1vh 0 4vh 0;
  }
  .attribution {
    display: flex; align-items: center; gap: 1.2vw;
  }
  .badge {
    background: var(--indigo);
    color: var(--jicama);
    font-size: 1.15vw;
    font-weight: 700;
    padding: 0.6vh 1.4vw;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .who {
    font-size: 1.4vw;
    color: var(--text-dark);
    opacity: 0.75;
  }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--jicama);
    opacity: 0.6;
    margin-top: 3vh;
    font-size: 1vw;
  }
  .dots {
    display: flex; gap: 0.5vw;
    flex-wrap: wrap;
  }
  .dot {
    width: 0.6vw; height: 0.6vw; border-radius: 50%;
    background: rgba(251,248,242,0.3);
    transition: background 0.3s ease;
  }
  .dot.active { background: var(--agave); }
  .live-dot {
    display: inline-block;
    width: 0.7vw; height: 0.7vw;
    border-radius: 50%;
    background: #6FCF97;
    margin-right: 0.6vw;
    animation: pulse 2s infinite ease-in-out;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying right now</h1>
      <div class="meta">Real App Store &amp; Google Play reviews &middot; unedited &middot; refreshed 2026-07-13 21:03</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">
      <div><span class="live-dot"></span>Remitly &middot; live customer voice, not marketing copy</div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

<script>

 y seguro gracias", "date": "2026-07-13", "rating": null}, {"source": "App Store", "name": "sky-steve", "text": "Remitly has made money transfer a breeze. The security is excellent, and the assurance is without a rival. I recommend Remitly above every other money transfer medium.", "date": "2026-07-11", "rating": 5}, {"source": "Google Play", "name": "Maribel Caba salda\u00f1a", "text": "super bueno y buen cambio estoy muy contenta", "date": "2026-07-13", "rating": null}, {"source": "App Store", "name": "Mel\u00e9ndez \ud83c\udded\ud83c\uddf3", "text": "Muy buena plataforma de env\u00edo \ud83e\udee1", "date": "2026-07-11", "rating": 5}, {"source": "Google Play", "name": "Joel Efrain", "text": "me parese muy bien todo se enbia rapido y seguro", "date": "2026-07-13", "rating": null}, {"source": "App Store", "name": "lo maximo . com", "text": "Bajo en comisi\u00f3n", "date": "2026-07-11", "rating": 5}, {"source": "Google Play", "name": "Waqas Athar", "text": "I like so much . very easy to send money . and argent . good \ud83d\ude0a\ud83d\udc4d", "date": "2026-07-13", "rating": null}, {"source": "App Store", "name": "SanGarmoney", "text": "Confianza total hasta hoy, gracias", "date": "2026-07-11", "rating": 5}, {"source": "Google Play", "name": "Castillo Navas", "text": "exelente servicio rapido y eficiencia", "date": "2026-07-13", "rating": null}, {"source": "App Store", "name": "marysilva20", "text": "Great and fast service.", "date": "2026-07-11", "rating": 5}, {"source": "Google Play", "name": "Oscar Trejo", "text": "pays better than exchanging cash at the counter :)", "date": "2026-07-13", "rating": null}, {"source": "App Store", "name": "Mi intima amiga", "text": "Xq me hace la vida m\u00e1s f\u00e1cil", "date": "2026-07-11", "rating": 5}, {"source": "Google Play", "name": "Mikael bilouboudi", "text": "tr\u00e8s bien et rapide", "date": "2026-07-13", "rating": null}, {"source": "App Store", "name": "Maria Olivo", "text": "This is safe way to send money to our loved ones. Thank you recommend 100%", "date": "2026-07-11", "rating": 5}, {"source": "Google Play", "name": "Trivalee Ciego-Gabriel", "text": "Easy transfer and is user friendly. Exchange rates seems good.", "date": "2026-07-13", "rating": null}, {"source": "App Store", "name": "\ud83e\udee1\ud83e\uddf0", "text": "Gracias por su servicio \ud83d\ude4f\ud83e\uddf0\ud83e\udee1", "date": "2026-07-11", "rating": 5}, {"source": "Google Play", "name": "Miguel Batista", "text": "Excelente aplicaci\u00f3n para enviar divisas!", "date": "2026-07-13", "rating": null}, {"source": "App Store", "name": "Dios bendiga nuestras finanzas", "text": "Lo mejor 10 estrellas", "date": "2026-07-10", "rating": 5}, {"source": "Google Play", "name": "Rafael Mora", "text": "todo muy bien hasta ahora, muchas gracias", "date": "2026-07-13", "rating": null}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const topLine = r.rating
      ? `<div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>`
      : `<div class="quote-mark">&ldquo;</div>`;
    card.innerHTML = `
      ${topLine}
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');

  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }

  setInterval(next, 7000);

  // A refresh job regenerates this file periodically. Reload on the same
  // cadence so the on-screen browser picks up fresh reviews on its own.
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
