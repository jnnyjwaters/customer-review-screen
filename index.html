<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Real Customer Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A;
    --jicama: #FBF8F2;
    --agave: #6FA0AF;
    --turmeric: #FFBC69;
    --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif;
    overflow: hidden;
  }
  .wrap {
    display: flex; flex-direction: column;
    width: 100vw; height: 100vh;
    padding: 4vh 6vw;
  }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--jicama);
    margin-bottom: 3vh;
  }
  .header h1 {
    font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif;
    font-weight: 700;
    font-size: 2.6vw;
    letter-spacing: 0.02em;
  }
  .header .meta {
    font-size: 1.1vw;
    opacity: 0.75;
  }
  .stage {
    flex: 1;
    position: relative;
  }
  .card {
    position: absolute; inset: 0;
    background: var(--jicama);
    border-radius: 24px;
    border-left: 12px solid var(--agave);
    padding: 5vh 5vw;
    display: flex; flex-direction: column; justify-content: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .card.active {
    opacity: 1;
    transform: translateY(0);
  }
  .stars {
    color: var(--turmeric);
    font-size: 2.6vw;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .quote-mark {
    font-size: 6vw;
    color: var(--agave);
    line-height: 1;
    font-family: Georgia, serif;
  }
  .quote-text {
    font-size: 3.1vw;
    line-height: 1.35;
    color: var(--text-dark);
    font-weight: 500;
    margin: 1vh 0 4vh 0;
  }
  .attribution {
    display: flex; align-items: center; gap: 1.2vw;
  }
  .badge {
    background: var(--indigo);
    color: var(--jicama);
    font-size: 1.15vw;
    font-weight: 700;
    padding: 0.6vh 1.4vw;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .who {
    font-size: 1.4vw;
    color: var(--text-dark);
    opacity: 0.75;
  }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--jicama);
    opacity: 0.6;
    margin-top: 3vh;
    font-size: 1vw;
  }
  .dots {
    display: flex; gap: 0.5vw;
    flex-wrap: wrap;
  }
  .dot {
    width: 0.6vw; height: 0.6vw; border-radius: 50%;
    background: rgba(251,248,242,0.3);
    transition: background 0.3s ease;
  }
  .dot.active { background: var(--agave); }
  .live-dot {
    display: inline-block;
    width: 0.7vw; height: 0.7vw;
    border-radius: 50%;
    background: #6FCF97;
    margin-right: 0.6vw;
    animation: pulse 2s infinite ease-in-out;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying right now</h1>
      <div class="meta">Real App Store &amp; Google Play reviews &middot; unedited &middot; refreshed 2026-07-08 16:45</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">
      <div><span class="live-dot"></span>Remitly &middot; live customer voice, not marketing copy</div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

<script>

ange rate is high, in favor of the dollar, but it\u2019s a useful service.", "date": "2026-07-06", "rating": 5}, {"source": "Google Play", "name": "Hendrika Wallace", "text": "the fees was 2 dollars now its 5 but it still is a good app", "date": "2026-07-08", "rating": null}, {"source": "App Store", "name": "Turk_C-137", "text": "Great way to send funds to family overseas", "date": "2026-07-06", "rating": 5}, {"source": "Google Play", "name": "Kamal Sharma", "text": "always give good rate \ud83d\ude04", "date": "2026-07-08", "rating": null}, {"source": "App Store", "name": "Yosicruz", "text": "Entrega inmediato", "date": "2026-07-06", "rating": 5}, {"source": "Google Play", "name": "Rocio Garcia Ruiz (Nutrici\u00f3n Roc\u00edo Garc\u00eda)", "text": "Dos gestiones y de *10*... una pena no haberla conocido antes.... Gracias \ud83d\ude4f", "date": "2026-07-08", "rating": null}, {"source": "App Store", "name": "The BlackEngel", "text": "Para enviar a Honduras", "date": "2026-07-06", "rating": 5}, {"source": "Google Play", "name": "Hoa Nguyen", "text": "Really like how it easy it is to use and how cheap the fees are. Also love that there are multiple delivery options too", "date": "2026-07-08", "rating": null}, {"source": "App Store", "name": "mosquiro26", "text": "Es una buena app me Canaria recibir mas descuentos ya que env\u00edo varias veces", "date": "2026-07-06", "rating": 5}, {"source": "Google Play", "name": "Tu Cuadro Seguro", "text": "Excelente tasa de bienvenida para enviar a mi familia en Venezuela y sin comisi\u00f3n como un buen gesto por la situaci\u00f3n actual.", "date": "2026-07-08", "rating": null}, {"source": "App Store", "name": "Jacqueline TD", "text": "Excelente servicio y muy puntuales", "date": "2026-07-06", "rating": 5}, {"source": "Google Play", "name": "Bonny Isaacs", "text": "excellent and safe", "date": "2026-07-08", "rating": null}, {"source": "App Store", "name": "Clariselymb", "text": "R\u00e1pido , confiable y con tarifas de env\u00edo muy bajas .\ud83d\ude0d", "date": "2026-07-06", "rating": 5}, {"source": "Google Play", "name": "Ihab Hip HOP", "text": "I use Remitly and recommend it.", "date": "2026-07-08", "rating": null}, {"source": "App Store", "name": "paleta payaso 35", "text": "Gracias por la oportunidad \nMuy bien Remitly", "date": "2026-07-06", "rating": 5}, {"source": "Google Play", "name": "David Quadri", "text": "easy and safe great experience", "date": "2026-07-08", "rating": null}, {"source": "App Store", "name": "Nancy d\u00edas", "text": "Las transferencias con Remitly son seguras y r\u00e1pidas y confiables. Recomiendo plenamente Remitly, ya que me ha ayudado mucho con los env\u00edos de dinero a M\u00e9xico para mis familiares", "date": "2026-07-06", "rating": 5}, {"source": "Google Play", "name": "Honeygem", "text": "easy set-up and competitive rates, reliable and fast transfer", "date": "2026-07-08", "rating": null}, {"source": "App Store", "name": "Jupiter_1989", "text": "La mejor app para enviar dinero a todas partes del mundo s\u00faper recomendable tasas bajas de env\u00edos todo muy bueno mil gracias", "date": "2026-07-06", "rating": 5}, {"source": "Google Play", "name": "Raul Hernandez", "text": "me encanta remitly app realmente lo recomiendo", "date": "2026-07-08", "rating": null}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const topLine = r.rating
      ? `<div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>`
      : `<div class="quote-mark">&ldquo;</div>`;
    card.innerHTML = `
      ${topLine}
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');

  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }

  setInterval(next, 7000);

  // A refresh job regenerates this file periodically. Reload on the same
  // cadence so the on-screen browser picks up fresh reviews on its own.
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
