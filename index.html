<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Real Customer Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A;
    --jicama: #FBF8F2;
    --agave: #6FA0AF;
    --turmeric: #FFBC69;
    --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif;
    overflow: hidden;
  }
  .wrap {
    display: flex; flex-direction: column;
    width: 100vw; height: 100vh;
    padding: 4vh 6vw;
  }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--jicama);
    margin-bottom: 3vh;
  }
  .header h1 {
    font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif;
    font-weight: 700;
    font-size: 2.6vw;
    letter-spacing: 0.02em;
  }
  .header .meta {
    font-size: 1.1vw;
    opacity: 0.75;
  }
  .stage {
    flex: 1;
    position: relative;
  }
  .card {
    position: absolute; inset: 0;
    background: var(--jicama);
    border-radius: 24px;
    border-left: 12px solid var(--agave);
    padding: 5vh 5vw;
    display: flex; flex-direction: column; justify-content: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .card.active {
    opacity: 1;
    transform: translateY(0);
  }
  .stars {
    color: var(--turmeric);
    font-size: 2.6vw;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .quote-mark {
    font-size: 6vw;
    color: var(--agave);
    line-height: 1;
    font-family: Georgia, serif;
  }
  .quote-text {
    font-size: 3.1vw;
    line-height: 1.35;
    color: var(--text-dark);
    font-weight: 500;
    margin: 1vh 0 4vh 0;
  }
  .attribution {
    display: flex; align-items: center; gap: 1.2vw;
  }
  .badge {
    background: var(--indigo);
    color: var(--jicama);
    font-size: 1.15vw;
    font-weight: 700;
    padding: 0.6vh 1.4vw;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .who {
    font-size: 1.4vw;
    color: var(--text-dark);
    opacity: 0.75;
  }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--jicama);
    opacity: 0.6;
    margin-top: 3vh;
    font-size: 1vw;
  }
  .dots {
    display: flex; gap: 0.5vw;
    flex-wrap: wrap;
  }
  .dot {
    width: 0.6vw; height: 0.6vw; border-radius: 50%;
    background: rgba(251,248,242,0.3);
    transition: background 0.3s ease;
  }
  .dot.active { background: var(--agave); }
  .live-dot {
    display: inline-block;
    width: 0.7vw; height: 0.7vw;
    border-radius: 50%;
    background: #6FCF97;
    margin-right: 0.6vw;
    animation: pulse 2s infinite ease-in-out;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying right now</h1>
      <div class="meta">Real App Store &amp; Google Play reviews &middot; unedited &middot; refreshed 2026-07-09 16:04</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">
      <div><span class="live-dot"></span>Remitly &middot; live customer voice, not marketing copy</div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

e in world. they are relabel and contribute effectively.", "date": "2026-07-09", "rating": null}, {"source": "App Store", "name": "Jr_ramirez", "text": "Es una excelente aplicaci\u00f3n, pero las comisiones se parecen bastante a las que ya est\u00e1n establecidas en varios bancos para hacer transferencias internacionales fuera mucho mejor as\u00ed las comisiones de Remitly estuvieran m\u00e1s bajas", "date": "2026-07-06", "rating": 5}, {"source": "Google Play", "name": "V\u0169 Phong Ho\u00e0ng", "text": "Th\u1eadt tuy\u1ec7t v\u1eddi s\u1ed1 m\u1ed9t c\u1ee7a ng\u01b0\u1eddi g\u1eedi ti\u1ec1n v\u1ec1 Vi\u1ec7t Nam T\u00f4i r\u1ea5t c\u1ea3m \u01a1n \u1ee9ng d\u1ee5ng \u2764\ufe0f\u2764\ufe0f\u2764\ufe0f", "date": "2026-07-09", "rating": null}, {"source": "App Store", "name": "APeRsON707", "text": "I love this, I use to support my family with this, it\u2019s very great with best transaction fees around that I\u2019ve found. \ud83d\udc4d would recommend", "date": "2026-07-06", "rating": 5}, {"source": "Google Play", "name": "Helen may Dadivas", "text": "I love it, since it was rewire. easy doing transferring money. \ud83d\ude0d\ud83d\ude0d\ud83d\ude0d", "date": "2026-07-09", "rating": null}, {"source": "App Store", "name": "Amitojr", "text": "Remitly is a great app for transferring funds, especially internationally. \n\nThe exchange rate is high, in favor of the dollar, but it\u2019s a useful service.", "date": "2026-07-06", "rating": 5}, {"source": "Google Play", "name": "Mohammad Dawood khan Mir Wali Khan", "text": "the easy way to transfer and fast way", "date": "2026-07-09", "rating": null}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const topLine = r.rating
      ? `<div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>`
      : `<div class="quote-mark">&ldquo;</div>`;
    card.innerHTML = `
      ${topLine}
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');

  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }

  setInterval(next, 7000);

  // A refresh job regenerates this file periodically. Reload on the same
  // cadence so the on-screen browser picks up fresh reviews on its own.
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
