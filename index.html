<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Real Customer Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A;
    --jicama: #FBF8F2;
    --agave: #6FA0AF;
    --turmeric: #FFBC69;
    --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif;
    overflow: hidden;
  }
  .wrap {
    display: flex; flex-direction: column;
    width: 100vw; height: 100vh;
    padding: 4vh 6vw;
  }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--jicama);
    margin-bottom: 3vh;
  }
  .header h1 {
    font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif;
    font-weight: 700;
    font-size: 2.6vw;
    letter-spacing: 0.02em;
  }
  .header .meta {
    font-size: 1.1vw;
    opacity: 0.75;
  }
  .stage {
    flex: 1;
    position: relative;
  }
  .card {
    position: absolute; inset: 0;
    background: var(--jicama);
    border-radius: 24px;
    border-left: 12px solid var(--agave);
    padding: 5vh 5vw;
    display: flex; flex-direction: column; justify-content: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .card.active {
    opacity: 1;
    transform: translateY(0);
  }
  .stars {
    color: var(--turmeric);
    font-size: 2.6vw;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .quote-mark {
    font-size: 6vw;
    color: var(--agave);
    line-height: 1;
    font-family: Georgia, serif;
  }
  .quote-text {
    font-size: 3.1vw;
    line-height: 1.35;
    color: var(--text-dark);
    font-weight: 500;
    margin: 1vh 0 4vh 0;
  }
  .attribution {
    display: flex; align-items: center; gap: 1.2vw;
  }
  .badge {
    background: var(--indigo);
    color: var(--jicama);
    font-size: 1.15vw;
    font-weight: 700;
    padding: 0.6vh 1.4vw;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .who {
    font-size: 1.4vw;
    color: var(--text-dark);
    opacity: 0.75;
  }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--jicama);
    opacity: 0.6;
    margin-top: 3vh;
    font-size: 1vw;
  }
  .dots {
    display: flex; gap: 0.5vw;
    flex-wrap: wrap;
  }
  .dot {
    width: 0.6vw; height: 0.6vw; border-radius: 50%;
    background: rgba(251,248,242,0.3);
    transition: background 0.3s ease;
  }
  .dot.active { background: var(--agave); }
  .live-dot {
    display: inline-block;
    width: 0.7vw; height: 0.7vw;
    border-radius: 50%;
    background: #6FCF97;
    margin-right: 0.6vw;
    animation: pulse 2s infinite ease-in-out;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying right now</h1>
      <div class="meta">Real App Store &amp; Google Play reviews &middot; unedited &middot; refreshed 2026-07-21 11:24</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">
      <div><span class="live-dot"></span>Remitly &middot; live customer voice, not marketing copy</div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

<script>

e": "2026-07-21", "rating": null}, {"source": "App Store", "name": "gliycett", "text": "Very easy and very fast", "date": "2026-07-19", "rating": 5}, {"source": "Google Play", "name": "Lucia Libre", "text": "It's so easy. I am truly grateful of sending money to my Country, the Philippines because in a few minutes they received it right away. Thank you so much, Remitly.", "date": "2026-07-21", "rating": null}, {"source": "App Store", "name": "RivrRoseMoon", "text": "The easiest and best way to send money!!! Once I began using Remitly, I do not send money any other way!!!", "date": "2026-07-19", "rating": 5}, {"source": "Google Play", "name": "R.E. Quimbo", "text": "fast and secure and good rates", "date": "2026-07-21", "rating": null}, {"source": "App Store", "name": "Oti father!!", "text": "This platform has been very dependable until yesterday when a transaction took 12 hrs to process but they delivered as promised due to system maintenance.  Would have liked a warning in advance of sending so I know ahead of time.", "date": "2026-07-19", "rating": 5}, {"source": "Google Play", "name": "Hung Le", "text": "r\u1ea5t tuy\u1ec7t v\u1eddi c\u1ea3m \u01a1n equipment Remitly r\u1ea5t nhi\u1ec1u. ch\u00fac m\u1ecdi ng\u01b0\u1eddi s\u1ee9c kh\u1ecfe \ud83d\udcaa\u2764\ufe0f\u2764\ufe0f\u2764\ufe0f", "date": "2026-07-21", "rating": null}, {"source": "App Store", "name": "Alanumas", "text": "Very helpful indications and user friendly platform.", "date": "2026-07-19", "rating": 5}, {"source": "Google Play", "name": "Christian Centeno", "text": "muy buena asta ahora", "date": "2026-07-21", "rating": null}, {"source": "App Store", "name": "Jhurrem", "text": "A penas empiezo a utilizar la app, y estoy satisfecha con los movimientos que he realizado, seguir\u00e9 us\u00e1ndola con tranquilidad hasta ahora.", "date": "2026-07-18", "rating": 4}, {"source": "Google Play", "name": "Jesse Matkin", "text": "way better than those dick heads at Western Union!", "date": "2026-07-21", "rating": null}, {"source": "App Store", "name": "Gonzalez$", "text": "Muy buena aplicaci\u00f3n recomendada 100%", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "\u00d6mer Demir", "text": "s\u00fcper bir uygulama eme\u011fi ge\u00e7enlere te\u015fekk\u00fcr ederim", "date": "2026-07-21", "rating": null}, {"source": "App Store", "name": "Urielito2", "text": "Es f\u00e1cil de usar, an\u00edmense", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "Li Fei Quek", "text": "Efficient communication on status of transaction. Generally expedient in effecting a transaction. In a word, Excellent.", "date": "2026-07-21", "rating": null}, {"source": "App Store", "name": "Jaxson 27", "text": "Absolutely safe fast excellent setup", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "Yuliana Zapien", "text": "k los env\u00edos son r\u00e1pidos y f\u00e1ciles d hacer y c\u00f3modos desde tu casa", "date": "2026-07-21", "rating": null}, {"source": "App Store", "name": "Cabras de monta\u00f1a", "text": "Excelente servicio", "date": "2026-07-18", "rating": 5}, {"source": "Google Play", "name": "Veronica Robles", "text": "Es facil y rapido, te evitas salir de tu casa, lo mejor que lo puedes enviar a la hora que quieras", "date": "2026-07-21", "rating": null}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const topLine = r.rating
      ? `<div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>`
      : `<div class="quote-mark">&ldquo;</div>`;
    card.innerHTML = `
      ${topLine}
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');

  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }

  setInterval(next, 7000);

  // A refresh job regenerates this file periodically. Reload on the same
  // cadence so the on-screen browser picks up fresh reviews on its own.
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
