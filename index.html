<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Real Customer Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A;
    --jicama: #FBF8F2;
    --agave: #6FA0AF;
    --turmeric: #FFBC69;
    --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif;
    overflow: hidden;
  }
  .wrap {
    display: flex; flex-direction: column;
    width: 100vw; height: 100vh;
    padding: 4vh 6vw;
  }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--jicama);
    margin-bottom: 3vh;
  }
  .header h1 {
    font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif;
    font-weight: 700;
    font-size: 2.6vw;
    letter-spacing: 0.02em;
  }
  .header .meta {
    font-size: 1.1vw;
    opacity: 0.75;
  }
  .stage {
    flex: 1;
    position: relative;
  }
  .card {
    position: absolute; inset: 0;
    background: var(--jicama);
    border-radius: 24px;
    border-left: 12px solid var(--agave);
    padding: 5vh 5vw;
    display: flex; flex-direction: column; justify-content: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .card.active {
    opacity: 1;
    transform: translateY(0);
  }
  .stars {
    color: var(--turmeric);
    font-size: 2.6vw;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .quote-mark {
    font-size: 6vw;
    color: var(--agave);
    line-height: 1;
    font-family: Georgia, serif;
  }
  .quote-text {
    font-size: 3.1vw;
    line-height: 1.35;
    color: var(--text-dark);
    font-weight: 500;
    margin: 1vh 0 4vh 0;
  }
  .attribution {
    display: flex; align-items: center; gap: 1.2vw;
  }
  .badge {
    background: var(--indigo);
    color: var(--jicama);
    font-size: 1.15vw;
    font-weight: 700;
    padding: 0.6vh 1.4vw;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .who {
    font-size: 1.4vw;
    color: var(--text-dark);
    opacity: 0.75;
  }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--jicama);
    opacity: 0.6;
    margin-top: 3vh;
    font-size: 1vw;
  }
  .dots {
    display: flex; gap: 0.5vw;
    flex-wrap: wrap;
  }
  .dot {
    width: 0.6vw; height: 0.6vw; border-radius: 50%;
    background: rgba(251,248,242,0.3);
    transition: background 0.3s ease;
  }
  .dot.active { background: var(--agave); }
  .live-dot {
    display: inline-block;
    width: 0.7vw; height: 0.7vw;
    border-radius: 50%;
    background: #6FCF97;
    margin-right: 0.6vw;
    animation: pulse 2s infinite ease-in-out;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying right now</h1>
      <div class="meta">Real App Store &amp; Google Play reviews &middot; unedited &middot; refreshed 2026-07-09 05:44</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">
      <div><span class="live-dot"></span>Remitly &middot; live customer voice, not marketing copy</div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

<script>
  const REVIEWS = [{"source": "Google Play", "name": "MILKER SR", "text": "muy buena aplicaci\u00f3n \ud83d\udc4d", "date": "2026-07-09", "rating": null}, {"source": "Google Play", "name": "Ruhul Sarkar", "text": "really very helpful apps", "date": "2026-07-09", "rating": null}, {"source": "Google Play", "name": "Jiraporn Van der looij", "text": "\u0e1a\u0e23\u0e34\u0e01\u0e32\u0e23\u0e14\u0e35 \u0e02\u0e31\u0e49\u0e19\u0e15\u0e2d\u0e19\u0e40\u0e02\u0e49\u0e32\u0e43\u0e08\u0e07\u0e48\u0e32\u0e22 \u0e23\u0e27\u0e14\u0e40\u0e23\u0e47\u0e27", "date": "2026-07-09", "rating": null}, {"source": "Google Play", "name": "Luis Perdomo", "text": "muy eficiente y r\u00e1pido", "date": "2026-07-09", "rating": null}, {"source": "Google Play", "name": "Anileme Soza", "text": "is the safest and fastest way to send money . I have trusted since 2021 the first time I used it and from my couch . thank you.", "date": "2026-07-09", "rating": null}, {"source": "Google Play", "name": "Erick Alt", "text": "Has honestly been a great experience. I enjoy how smooth it is to make transfers and store the contacts for this. app also works smoothly", "date": "2026-07-08", "rating": null}, {"source": "Google Play", "name": "Denis Provost", "text": "fast, easy, instant, wonderful", "date": "2026-07-08", "rating": null}, {"source": "Google Play", "name": "Cesar Vergara", "text": "rapido y f\u00e1cil de utilizar", "date": "2026-07-08", "rating": null}, {"source": "Google Play", "name": "Robert Tavarez", "text": "this is by far the best money transfer agency thatvi have dealt with..completely hassle free..", "date": "2026-07-08", "rating": null}, {"source": "Google Play", "name": "Horacio Flores", "text": "perfecto i muy seguro", "date": "2026-07-08", "rating": null}, {"source": "Google Play", "name": "Raulina Dathe", "text": "I love the convenience and great service!", "date": "2026-07-08", "rating": null}, {"source": "Google Play", "name": "Kuldeep Kaur", "text": "i love your service fast and reliable", "date": "2026-07-08", "rating": null}, {"source": "Google Play", "name": "YAMIRI GALLARDO", "text": "r\u00e1pido y sencillo. lo que si ten\u00e9is que mejorar m\u00e1s el tipo de cambio", "date": "2026-07-08", "rating": null}, {"source": "Google Play", "name": "Emilio Morales", "text": "Seguro, r\u00e1pido sin complicaciones.", "date": "2026-07-08", "rating": null}, {"source": "Google Play", "name": "Asad Madani", "text": "Easy and fast transaction", "date": "2026-07-08", "rating": null}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const topLine = r.rating
      ? `<div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>`
      : `<div class="quote-mark">&ldquo;</div>`;
    card.innerHTML = `
      ${topLine}
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');

  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }

  setInterval(next, 7000);

  // A refresh job regenerates this file periodically. Reload on the same
  // cadence so the on-screen browser picks up fresh reviews on its own.
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
