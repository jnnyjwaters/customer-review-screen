<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Remitly — Real Customer Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --indigo: #2C415A;
    --jicama: #FBF8F2;
    --agave: #6FA0AF;
    --turmeric: #FFBC69;
    --text-dark: #1A1A1A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--indigo);
    font-family: 'Greycliff CF', 'Proxima Nova', 'Poppins', Arial, sans-serif;
    overflow: hidden;
  }
  .wrap {
    display: flex; flex-direction: column;
    width: 100vw; height: 100vh;
    padding: 4vh 6vw;
  }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--jicama);
    margin-bottom: 3vh;
  }
  .header h1 {
    font-family: 'Masqualero', 'Proxima Nova', Arial, sans-serif;
    font-weight: 700;
    font-size: 2.6vw;
    letter-spacing: 0.02em;
  }
  .header .meta {
    font-size: 1.1vw;
    opacity: 0.75;
  }
  .stage {
    flex: 1;
    position: relative;
  }
  .card {
    position: absolute; inset: 0;
    background: var(--jicama);
    border-radius: 24px;
    border-left: 12px solid var(--agave);
    padding: 5vh 5vw;
    display: flex; flex-direction: column; justify-content: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .card.active {
    opacity: 1;
    transform: translateY(0);
  }
  .stars {
    color: var(--turmeric);
    font-size: 2.6vw;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .quote-mark {
    font-size: 6vw;
    color: var(--agave);
    line-height: 1;
    font-family: Georgia, serif;
  }
  .quote-text {
    font-size: 3.1vw;
    line-height: 1.35;
    color: var(--text-dark);
    font-weight: 500;
    margin: 1vh 0 4vh 0;
  }
  .attribution {
    display: flex; align-items: center; gap: 1.2vw;
  }
  .badge {
    background: var(--indigo);
    color: var(--jicama);
    font-size: 1.15vw;
    font-weight: 700;
    padding: 0.6vh 1.4vw;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .who {
    font-size: 1.4vw;
    color: var(--text-dark);
    opacity: 0.75;
  }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    color: var(--jicama);
    opacity: 0.6;
    margin-top: 3vh;
    font-size: 1vw;
  }
  .dots {
    display: flex; gap: 0.5vw;
    flex-wrap: wrap;
  }
  .dot {
    width: 0.6vw; height: 0.6vw; border-radius: 50%;
    background: rgba(251,248,242,0.3);
    transition: background 0.3s ease;
  }
  .dot.active { background: var(--agave); }
  .live-dot {
    display: inline-block;
    width: 0.7vw; height: 0.7vw;
    border-radius: 50%;
    background: #6FCF97;
    margin-right: 0.6vw;
    animation: pulse 2s infinite ease-in-out;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>What customers are saying right now</h1>
      <div class="meta">Real App Store &amp; Google Play reviews &middot; unedited &middot; refreshed 2026-07-23 00:05</div>
    </div>
    <div class="stage" id="stage"></div>
    <div class="footer">
      <div><span class="live-dot"></span>Remitly &middot; live customer voice, not marketing copy</div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

<script>
  const REVIEWS = [{"source": "App Store", "name": "poorashi", "text": "It\u2019s an excellent service provider. I love it.", "date": "2026-07-21", "rating": 5}, {"source": "Google Play", "name": "Fernando Suarez", "text": "easy to ftransfer", "date": "2026-07-22", "rating": null}, {"source": "App Store", "name": "Vida m\u00e1s f\u00e1cil", "text": "R\u00e1pido seguro y muy buen servicio sin salir de casa o donde te encuentres solo son unos pocos minutos y listo \u2026", "date": "2026-07-21", "rating": 5}, {"source": "Google Play", "name": "Daniela Fort\u00edn", "text": "Es muy r\u00e1pido y seguro", "date": "2026-07-22", "rating": null}, {"source": "App Store", "name": "Purpledesrtpyo", "text": "I love how easy this is !!!", "date": "2026-07-21", "rating": 5}, {"source": "Google Play", "name": "Aida Miguelena", "text": "excelente app felicidades.", "date": "2026-07-22", "rating": null}, {"source": "App Store", "name": "Me3___", "text": "Lifesaving app that I feel confident I can rely on when it\u2019s most important. Great customer service too", "date": "2026-07-21", "rating": 5}, {"source": "Google Play", "name": "Yosue Avila", "text": "excelente app muy confiable \ud83d\udc4d", "date": "2026-07-22", "rating": null}, {"source": "App Store", "name": "Pastor Alphonze", "text": "The best way to send money ever. So fast and efficient. Great tool to have.", "date": "2026-07-21", "rating": 5}, {"source": "Google Play", "name": "Anne Alunday", "text": "very fast transaction,i love it", "date": "2026-07-22", "rating": null}, {"source": "App Store", "name": "Tanco.V", "text": "S\u00faper sencillo de utilizar la App, el dinero llegar r\u00e1pido, buen tipo de cambio y tarifas bajas, solo en ocasiones tengo que comenzar el\nProceso por que me rechaza el env\u00edo", "date": "2026-07-21", "rating": 5}, {"source": "Google Play", "name": "Muhib Ullah", "text": "good and very fast app to transfer money in our country \u2764\ufe0f\u2764\ufe0f", "date": "2026-07-22", "rating": null}, {"source": "App Store", "name": "Rudra108", "text": "Incredibly convenient and seamless way to send money abroad. Fees are totally worth it.", "date": "2026-07-21", "rating": 5}, {"source": "Google Play", "name": "Lorena Soto Aguirre", "text": "Es muy segura y rapida", "date": "2026-07-22", "rating": null}, {"source": "App Store", "name": "DEVIL-09", "text": "remitly is the best app I ever used. I really love this app. Fast quickest trustable.", "date": "2026-07-21", "rating": 5}, {"source": "Google Play", "name": "J. SoRia", "text": "Easy to send money", "date": "2026-07-22", "rating": null}, {"source": "App Store", "name": "Iyalodemary", "text": "R\u00e1pido seguro y confiable", "date": "2026-07-20", "rating": 5}, {"source": "Google Play", "name": "Jasson Amaya", "text": "muy f\u00e1cil de usar y seguro", "date": "2026-07-22", "rating": null}, {"source": "App Store", "name": "Reside me", "text": "It\u2019s good, to be able to connect with the family the money arrives quickly and without intermediaries Always good exchange rate", "date": "2026-07-20", "rating": 5}, {"source": "Google Play", "name": "sandra milena sevilla perez", "text": "Muy baja comisi\u00f3n y sin tantas complicaciones el env\u00edo", "date": "2026-07-22", "rating": null}, {"source": "App Store", "name": "Diangerli", "text": "Desde el primer env\u00edo me gust\u00f3 la rapidez y lo eficaz que es la app para enviar el dinero", "date": "2026-07-20", "rating": 5}, {"source": "Google Play", "name": "Azamat Xalimov", "text": "very nice \ud83d\udc4c app for transfer", "date": "2026-07-22", "rating": null}, {"source": "App Store", "name": "omo yemaya bell", "text": "Lo mejor de lo mejor", "date": "2026-07-20", "rating": 5}, {"source": "Google Play", "name": "Cindy Garay", "text": "podrian pagarlo mejor el dolar.", "date": "2026-07-22", "rating": null}, {"source": "App Store", "name": "Lis bancer", "text": "R\u00e1pido y confiable", "date": "2026-07-20", "rating": 5}, {"source": "Google Play", "name": "Edgar Barrera", "text": "I like to use remilty,because the transaction is done right away", "date": "2026-07-22", "rating": null}, {"source": "App Store", "name": "Julio Matos (Tony)", "text": "Muy f\u00e1cil y r\u00e1pido", "date": "2026-07-20", "rating": 5}, {"source": "Google Play", "name": "namazzi stela", "text": "it's very fast better than sendwave", "date": "2026-07-22", "rating": null}, {"source": "App Store", "name": "Yeyling1", "text": "Estoy fascinada con poder aser env\u00edos a mis seres queridos mas f\u00e1cil y m\u00e1s r\u00e1pido", "date": "2026-07-20", "rating": 5}, {"source": "Google Play", "name": "GLADYS PANIAGUA", "text": "Mi dinero llega a tiempo", "date": "2026-07-22", "rating": null}];
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');

  REVIEWS.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : '');
    const topLine = r.rating
      ? `<div class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>`
      : `<div class="quote-mark">&ldquo;</div>`;
    card.innerHTML = `
      ${topLine}
      <div class="quote-text">${r.text.replace(/</g,'&lt;')}</div>
      <div class="attribution">
        <span class="badge">${r.source}</span>
        <span class="who">${r.name} &middot; ${r.date}</span>
      </div>`;
    stage.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(dot);
  });

  let idx = 0;
  const cards = stage.querySelectorAll('.card');
  const dots = dotsWrap.querySelectorAll('.dot');

  function next() {
    cards[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (idx + 1) % cards.length;
    cards[idx].classList.add('active');
    dots[idx].classList.add('active');
  }

  setInterval(next, 7000);

  // A refresh job regenerates this file periodically. Reload on the same
  // cadence so the on-screen browser picks up fresh reviews on its own.
  setTimeout(() => location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
